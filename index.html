            // ============================================================
            // CHART RENDERER (Canvas-based candlestick chart)
            // ============================================================
            class ChartRenderer {
                constructor(canvasId) {
                    this.canvas = document.getElementById(canvasId);
                    if (!this.canvas) return;
                    this.ctx = this.canvas.getContext('2d');
                    this.resize();
                    window.addEventListener('resize', () => this.resize());
                }

                resize() {
                    const rect = this.canvas.parentElement.getBoundingClientRect();
                    this.canvas.width = rect.width * window.devicePixelRatio;
                    this.canvas.height = rect.height * window.devicePixelRatio;
                    this.canvas.style.width = rect.width + 'px';
                    this.canvas.style.height = rect.height + 'px';
                    this.width = rect.width;
                    this.height = rect.height;
                    this.dpr = window.devicePixelRatio || 1;
                    this.ctx.scale(this.dpr, this.dpr);
                }

                render(candles, orderBlocks, volumeProfile, currentPrice) {
                    const ctx = this.ctx;
                    const w = this.width;
                    const h = this.height;
                    const dpr = this.dpr;

                    ctx.clearRect(0, 0, w, h);

                    if (!candles || candles.length === 0) {
                        ctx.fillStyle = '#8b949e';
                        ctx.font = '14px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.fillText('لا توجد بيانات', w / 2, h / 2);
                        return;
                    }

                    const padding = { top: 20, bottom: 30, left: 60, right: 20 };
                    const chartW = w - padding.left - padding.right;
                    const chartH = h - padding.top - padding.bottom;

                    const high = Math.max(...candles.map(c => c.high));
                    const low = Math.min(...candles.map(c => c.low));
                    const range = high - low || 1;

                    const volMax = Math.max(...candles.map(c => c.volume || 1));
                    const volH = chartH * 0.18;
                    const volY0 = h - padding.bottom - volH;

                    const candleW = Math.min(chartW / candles.length * 0.7, 8);
                    const gap = candleW * 0.3;

                    // Draw grid
                    ctx.strokeStyle = 'rgba(48, 54, 61, 0.4)';
                    ctx.lineWidth = 0.5;
                    for (let i = 0; i < 5; i++) {
                        const y = padding.top + (chartH / 5) * i;
                        ctx.beginPath();
                        ctx.moveTo(padding.left, y);
                        ctx.lineTo(w - padding.right, y);
                        ctx.stroke();
                        const price = high - (range / 5) * i;
                        ctx.fillStyle = '#484f58';
                        ctx.font = '10px sans-serif';
                        ctx.textAlign = 'right';
                        ctx.fillText(Utils.formatPrice(price, 'USDT'), padding.left - 6, y + 3);
                    }

                    // Draw volume profile on right side (VPVR)
                    if (volumeProfile && volumeProfile.profile && volumeProfile.profile.length > 0) {
                        const vpW = 20;
                        const vpX = w - padding.right - vpW;
                        const maxV = Math.max(...volumeProfile.profile);
                        if (maxV > 0) {
                            for (let i = 0; i < volumeProfile.profile.length; i++) {
                                const ratio = volumeProfile.profile[i] / maxV;
                                const y = padding.top + chartH - (i / volumeProfile.profile.length) * chartH;
                                const barH = chartH / volumeProfile.profile.length;
                                const barW = vpW * ratio;
                                ctx.fillStyle = `rgba(88, 166, 255, ${0.2 + 0.5 * ratio})`;
                                ctx.fillRect(vpX, y - barH / 2, barW, Math.max(barH - 0.5, 1));
                            }
                            // POC line
                            if (volumeProfile.poc) {
                                const pocY = padding.top + chartH - ((volumeProfile.poc - low) / range) * chartH;
                                ctx.strokeStyle = '#f0b90b';
                                ctx.lineWidth = 1.5;
                                ctx.setLineDash([3, 3]);
                                ctx.beginPath();
                                ctx.moveTo(vpX, pocY);
                                ctx.lineTo(vpX + vpW, pocY);
                                ctx.stroke();
                                ctx.setLineDash([]);
                                ctx.fillStyle = '#f0b90b';
                                ctx.font = '8px sans-serif';
                                ctx.textAlign = 'left';
                                ctx.fillText('POC', vpX + vpW + 2, pocY + 2);
                            }
                        }
                    }

                    // Draw order blocks
                    if (orderBlocks) {
                        for (const block of orderBlocks) {
                            const yHigh = padding.top + chartH - ((block.high - low) / range) * chartH;
                            const yLow = padding.top + chartH - ((block.low - low) / range) * chartH;
                            const color = block.type === 'bullish' ? 'rgba(0, 200, 151, 0.15)' :
                                'rgba(246, 70, 93, 0.15)';
                            ctx.fillStyle = color;
                            ctx.fillRect(padding.left, yHigh, chartW, yLow - yHigh);
                            ctx.strokeStyle = block.type === 'bullish' ? '#00c897' : '#f6465d';
                            ctx.lineWidth = 1;
                            ctx.setLineDash([2, 2]);
                            ctx.strokeRect(padding.left, yHigh, chartW, yLow - yHigh);
                            ctx.setLineDash([]);

                            // Label
                            ctx.fillStyle = block.type === 'bullish' ? '#00c897' : '#f6465d';
                            ctx.font = '8px sans-serif';
                            ctx.textAlign = 'left';
                            const label = block.type === 'bullish' ? 'OB+' : 'OB-';
                            ctx.fillText(label, padding.left + 2, yHigh - 2);
                        }
                    }

                    // Draw candlesticks
                    for (let i = 0; i < candles.length; i++) {
                        const c = candles[i];
                        const x = padding.left + (i / candles.length) * chartW;
                        const openY = padding.top + chartH - ((c.open - low) / range) * chartH;
                        const closeY = padding.top + chartH - ((c.close - low) / range) * chartH;
                        const highY = padding.top + chartH - ((c.high - low) / range) * chartH;
                        const lowY = padding.top + chartH - ((c.low - low) / range) * chartH;

                        const isGreen = c.close >= c.open;
                        const color = isGreen ? '#00c897' : '#f6465d';

                        // Wick
                        ctx.strokeStyle = color;
                        ctx.lineWidth = 0.8;
                        ctx.beginPath();
                        ctx.moveTo(x, highY);
                        ctx.lineTo(x, lowY);
                        ctx.stroke();

                        // Body
                        const bodyTop = Math.min(openY, closeY);
                        const bodyBottom = Math.max(openY, closeY);
                        const bodyH = Math.max(bodyBottom - bodyTop, 1);
                        const halfW = candleW / 2;
                        ctx.fillStyle = color;
                        ctx.fillRect(x - halfW, bodyTop, candleW, bodyH);

                        // Current price highlight on last candle
                        if (i === candles.length - 1 && currentPrice) {
                            const priceY = padding.top + chartH - ((currentPrice - low) / range) * chartH;
                            ctx.strokeStyle = '#f0b90b';
                            ctx.lineWidth = 1.5;
                            ctx.setLineDash([4, 4]);
                            ctx.beginPath();
                            ctx.moveTo(padding.left, priceY);
                            ctx.lineTo(w - padding.right, priceY);
                            ctx.stroke();
                            ctx.setLineDash([]);
                            ctx.fillStyle = '#f0b90b';
                            ctx.font = '9px sans-serif';
                            ctx.textAlign = 'right';
                            ctx.fillText(Utils.formatPrice(currentPrice, 'USDT'), w - padding.right - 2, priceY - 2);
                        }
                    }

                    // Volume bars
                    for (let i = 0; i < candles.length; i++) {
                        const c = candles[i];
                        const x = padding.left + (i / candles.length) * chartW;
                        const volRatio = c.volume / volMax;
                        const barH = volRatio * volH;
                        const isGreen = c.close >= c.open;
                        const color = isGreen ? 'rgba(0, 200, 151, 0.5)' : 'rgba(246, 70, 93, 0.5)';
                        const halfW = Math.min(candleW / 2, 3);
                        ctx.fillStyle = color;
                        ctx.fillRect(x - halfW, volY0 + volH - barH, halfW * 2, barH);
                    }

                    // X-axis time labels
                    const step = Math.max(1, Math.floor(candles.length / 10));
                    for (let i = 0; i < candles.length; i += step) {
                        const c = candles[i];
                        const x = padding.left + (i / candles.length) * chartW;
                        ctx.fillStyle = '#484f58';
                        ctx.font = '8px sans-serif';
                        ctx.textAlign = 'center';
                        const d = new Date(c.time);
                        const label = d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0');
                        ctx.fillText(label, x, h - 4);
                    }

                    // Draw volume profile label
                    ctx.fillStyle = '#484f58';
                    ctx.font = '8px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('VPVR', w - padding.right - 10, padding.top - 4);
                }
            }

            // ============================================================
            // MAIN APP
            // ============================================================
            class App {
                constructor() {
                    this.initialized = false;
                    this.chartRenderer = null;
                    this.analysisRunning = false;
                }

                async init() {
                    if (this.initialized) return;

                    // Load state from storage
                    state.signals = StorageManager.loadSignals();
                    state.archive = StorageManager.loadArchive();
                    state.notifications = StorageManager.loadNotifications();
                    state.errorLogs = StorageManager.loadErrorLogs();

                    // Initialize chart renderer
                    this.chartRenderer = new ChartRenderer('chartCanvas');

                    // Setup UI
                    this._setupUI();

                    // Request notification permission
                    NotificationManager.requestPermission();

                    // Init install manager
                    InstallManager.init();

                    // Load initial data for all symbols
                    await this._loadAllData();

                    // Start WebSocket feed
                    this._startWebSocket();

                    // Start background analysis
                    this._startAnalysis();

                    // Initial render
                    await this._updateChart();

                    this.initialized = true;
                    console.log('✅ ProTrade initialized');
                }

                _setupUI() {
                    // TF selector
                    document.querySelectorAll('#tfSelector button').forEach(btn => {
                        btn.addEventListener('click', () => {
                            document.querySelectorAll('#tfSelector button').forEach(b => b.classList.remove(
                            'active'));
                            btn.classList.add('active');
                            state.currentTF = btn.dataset.tf;
                            this._updateChart();
                        });
                    });

                    // Archive toggle
                    document.getElementById('toggleArchive').addEventListener('click', () => {
                        UIManager.toggleArchive();
                    });

                    // Notifications bell
                    const bell = document.getElementById('notifBell');
                    const dropdown = document.getElementById('notifDropdown');
                    if (bell && dropdown) {
                        bell.addEventListener('click', (e) => {
                            e.stopPropagation();
                            dropdown.classList.toggle('open');
                            if (dropdown.classList.contains('open')) {
                                NotificationManager.markAllRead();
                            }
                        });
                        document.addEventListener('click', () => {
                            dropdown.classList.remove('open');
                        });
                    }

                    // Refresh button
                    document.getElementById('refreshBtn').addEventListener('click', () => {
                        this._loadAllData().then(() => this._updateChart());
                        UIManager.showToast('🔄 جاري تحديث البيانات...', 'info');
                    });

                    // Render initial notifications
                    NotificationManager._renderNotifications();
                    NotificationManager._updateBadge();

                    // Render archive
                    ArchiveManager._renderArchive();
                    UIManager.updateArchiveCount();
                }

                async _loadAllData() {
                    try {
                        UIManager.setChartLoading(true);
                        const tf = state.currentTF;

                        // Fetch klines for all symbols
                        await Promise.all(SYMBOLS.map(async (sym) => {
                            try {
                                const candles = await ApiService.fetchKlines(sym, tf, MAX_CANDLES);
                                if (!state.candles[sym]) state.candles[sym] = {};
                                state.candles[sym][tf] = candles;
                            } catch (e) {
                                console.error(`Failed to load ${sym}:`, e);
                                this._logError('loadData', sym, e);
                            }
                        }));

                        // Fetch 24hr prices
                        const prices = await ApiService.fetchAll24hr(SYMBOLS);
                        for (const sym of SYMBOLS) {
                            if (prices[sym]) {
                                state.realtimePrice[sym] = prices[sym];
                            }
                        }

                        UIManager.updateCoinStrip(state.realtimePrice);
                        UIManager.setChartLoading(false);

                        // Update price display
                        const currentData = state.realtimePrice[state.currentSymbol];
                        if (currentData) {
                            UIManager.updateChartPrice(currentData.price, currentData.change);
                        }

                        return true;
                    } catch (e) {
                        console.error('loadAllData error:', e);
                        this._logError('loadAllData', 'all', e);
                        UIManager.setChartLoading(false);
                        return false;
                    }
                }

                _startWebSocket() {
                    const feed = new BinanceFeed(
                        (symbol, price, volume, time) => {
                            // Update realtime price
                            if (state.realtimePrice[symbol]) {
                                state.realtimePrice[symbol].price = price;
                                state.realtimePrice[symbol].volume = volume;
                            } else {
                                state.realtimePrice[symbol] = { price, change: 0, volume, high: 0, low: 0 };
                            }

                            // Update UI if this is the current symbol
                            if (symbol === state.currentSymbol) {
                                const data = state.realtimePrice[symbol];
                                UIManager.updateChartPrice(data.price, data.change);
                                UIManager.updateLastUpdate();
                            }

                            // Update coin strip
                            UIManager.updateCoinStrip(state.realtimePrice);

                            // Update chart with latest candle
                            this._updateChartCandle(symbol, price, time);
                        },
                        (e) => {
                            console.error('WS error:', e);
                            state.isConnected = false;
                            document.getElementById('dataStatus').textContent = '⚠️ غير متصل';
                            this._logError('websocket', 'error', e);
                        },
                        () => {
                            state.isConnected = true;
                            document.getElementById('dataStatus').textContent = '✅ متصل';
                            console.log('WebSocket connected');
                        },
                        () => {
                            state.isConnected = false;
                            document.getElementById('dataStatus').textContent = '⚠️ غير متصل';
                        }
                    );

                    feed.connect(SYMBOLS);
                    state.ws = feed;
                }

                _updateChartCandle(symbol, price, time) {
                    if (symbol !== state.currentSymbol) return;
                    const tf = state.currentTF;
                    const candles = state.candles[symbol]?.[tf];
                    if (!candles || candles.length === 0) return;

                    const last = candles[candles.length - 1];
                    const lastTime = last.time;

                    // Check if we need a new candle (timeframe based)
                    const tfMs = this._tfToMs(tf);
                    if (time - lastTime >= tfMs) {
                        // New candle
                        const newCandle = {
                            time: time,
                            open: price,
                            high: price,
                            low: price,
                            close: price,
                            volume: 0
                        };
                        candles.push(newCandle);
                        if (candles.length > MAX_CANDLES) candles.shift();
                    } else {
                        // Update current candle
                        last.high = Math.max(last.high, price);
                        last.low = Math.min(last.low, price);
                        last.close = price;
                        last.volume += 1;
                    }

                    // Re-render chart
                    this._renderChart(candles);
                }

                _tfToMs(tf) {
                    const map = {
                        '1m': 60000,
                        '5m': 300000,
                        '15m': 900000,
                        '1h': 3600000,
                        '4h': 14400000,
                        '1d': 86400000
                    };
                    return map[tf] || 300000;
                }

                async _updateChart() {
                    const sym = state.currentSymbol;
                    const tf = state.currentTF;

                    // Load data if not present
                    if (!state.candles[sym]?.[tf]) {
                        try {
                            const candles = await ApiService.fetchKlines(sym, tf, MAX_CANDLES);
                            if (!state.candles[sym]) state.candles[sym] = {};
                            state.candles[sym][tf] = candles;
                        } catch (e) {
                            console.error('updateChart error:', e);
                            this._logError('updateChart', sym, e);
                            return;
                        }
                    }

                    const candles = state.candles[sym]?.[tf] || [];
                    if (candles.length === 0) return;

                    // Update title
                    document.getElementById('chartTitle').textContent = DISPLAY_SYMBOLS[sym] || sym;

                    // Update price
                    const priceData = state.realtimePrice[sym];
                    if (priceData) {
                        UIManager.updateChartPrice(priceData.price, priceData.change);
                    }

                    this._renderChart(candles);
                    UIManager.updateLastUpdate();

                    // Generate signals for this symbol
                    await this._analyzeSymbol(sym, tf);
                }

                _renderChart(candles) {
                    if (!this.chartRenderer) return;

                    const sym = state.currentSymbol;
                    const tf = state.currentTF;

                    // Detect order blocks
                    const blocks = OrderBlockDetector.detect(candles);

                    // Analyze volume profile
                    const vp = VolumeProfileAnalyzer.analyze(candles);

                    // Get current price
                    const priceData = state.realtimePrice[sym];
                    const currentPrice = priceData ? priceData.price : (candles.length > 0 ? candles[candles.length - 1]
                        .close : 0);

                    // Render
                    this.chartRenderer.render(candles, blocks, vp, currentPrice);
                }

                _startAnalysis() {
                    if (this.analysisRunning) return;
                    this.analysisRunning = true;

                    // Run analysis every 30 seconds
                    setInterval(async () => {
                        if (!state.isConnected) return;
                        try {
                            // Analyze all symbols in background
                            for (const sym of SYMBOLS) {
                                await this._analyzeSymbol(sym, state.currentTF);
                            }
                            // Update signals UI
                            UIManager.updateSignals(state.signals);
                            UIManager.updateCoinStrip(state.realtimePrice);
                        } catch (e) {
                            console.error('Analysis interval error:', e);
                            this._logError('analysisInterval', 'all', e);
                        }
                    }, 30000);

                    // Also run immediately
                    setTimeout(async () => {
                        for (const sym of SYMBOLS) {
                            await this._analyzeSymbol(sym, state.currentTF);
                        }
                        UIManager.updateSignals(state.signals);
                    }, 2000);
                }

                async _analyzeSymbol(symbol, timeframe) {
                    try {
                        const candles = state.candles[symbol]?.[timeframe];
                        if (!candles || candles.length < 20) return;

                        const priceData = state.realtimePrice[symbol];
                        const price = priceData ? priceData.price : candles[candles.length - 1].close;

                        // Generate signal
                        const signal = SignalGenerator.generate(symbol, candles, price, priceData ? priceData.volume : 0,
                            timeframe);

                        if (signal) {
                            // Check if we already have a similar signal for this symbol
                            const existing = state.signals.filter(s =>
                                s.symbol === symbol &&
                                s.type === signal.type &&
                                Math.abs(s.entry - signal.entry) / s.entry < 0.02 &&
                                (Date.now() - s.time) < 3600000 // within 1 hour
                            );

                            if (existing.length === 0) {
                                signal.id = Utils.randomId();
                                state.signals.push(signal);
                                if (state.signals.length > 100) state.signals.shift();
                                StorageManager.saveSignals(state.signals);

                                // Send notification
                                const title = `📊 إشارة ${signal.type} ${DISPLAY_SYMBOLS[symbol] || symbol}`;
                                const body =
                                    `دخول: ${Utils.formatPrice(signal.entry, symbol)} | وقف: ${Utils.formatPrice(signal.stopLoss, symbol)} | نسبة النجاح: ${signal.winRate}%`;
                                NotificationManager.send(title, body, { signal });

                                // Update UI
                                UIManager.updateSignals(state.signals);
                                UIManager.updateCoinStrip(state.realtimePrice);

                                // Auto-archive old signals that might have hit targets (simplified)
                                this._checkSignalCompletion(signal);
                            }
                        }

                        // Store pending signals for badge
                        if (!state.pendingSignals[symbol]) state.pendingSignals[symbol] = [];
                        state.pendingSignals[symbol] = state.signals.filter(s => s.symbol === symbol);

                    } catch (e) {
                        console.error(`analyzeSymbol ${symbol} error:`, e);
                        this._logError('analyzeSymbol', symbol, e);
                    }
                }

                // FIXED: Check completion based on new targets (2x, 3x, 4x of stop)
                _checkSignalCompletion(signal) {
                    // Check after 2 hours (or when price moves significantly)
                    const check = () => {
                        const stillActive = state.signals.some(s => s.id === signal.id);
                        if (!stillActive) return;

                        const priceData = state.realtimePrice[signal.symbol];
                        if (!priceData) return;

                        const currentPrice = priceData.price;
                        const entry = signal.entry;
                        const sl = signal.stopLoss;
                        const t1 = signal.target1;
                        const t2 = signal.target2;
                        const t3 = signal.target3;

                        let result = 'pending';
                        let closeReason = 'manual';
                        let profitLoss = 0;

                        if (signal.type === 'BUY') {
                            if (currentPrice >= t3) {
                                result = 'win';
                                closeReason = 'target';
                                profitLoss = ((currentPrice - entry) / entry) * 100;
                            } else if (currentPrice >= t2) {
                                result = 'win';
                                closeReason = 'target';
                                profitLoss = ((currentPrice - entry) / entry) * 100;
                            } else if (currentPrice >= t1) {
                                result = 'win';
                                closeReason = 'target';
                                profitLoss = ((currentPrice - entry) / entry) * 100;
                            } else if (currentPrice <= sl) {
                                result = 'loss';
                                closeReason = 'stop';
                                profitLoss = ((currentPrice - entry) / entry) * 100;
                            }
                        } else {
                            if (currentPrice <= t3) {
                                result = 'win';
                                closeReason = 'target';
                                profitLoss = ((entry - currentPrice) / entry) * 100;
                            } else if (currentPrice <= t2) {
                                result = 'win';
                                closeReason = 'target';
                                profitLoss = ((entry - currentPrice) / entry) * 100;
                            } else if (currentPrice <= t1) {
                                result = 'win';
                                closeReason = 'target';
                                profitLoss = ((entry - currentPrice) / entry) * 100;
                            } else if (currentPrice >= sl) {
                                result = 'loss';
                                closeReason = 'stop';
                                profitLoss = ((entry - currentPrice) / entry) * 100;
                            }
                        }

                        // If 4 hours passed and still active, close manually
                        if (Date.now() - signal.time > 14400000 && result === 'pending') {
                            result = 'loss';
                            closeReason = 'manual';
                            profitLoss = ((currentPrice - entry) / entry) * 100;
                            if (signal.type === 'SELL') profitLoss = -profitLoss;
                        }

                        if (result !== 'pending') {
                            // Remove from signals and add to archive
                            state.signals = state.signals.filter(s => s.id !== signal.id);
                            StorageManager.saveSignals(state.signals);
                            ArchiveManager.addTrade(signal, result, closeReason, profitLoss);
                            UIManager.updateSignals(state.signals);
                            UIManager.updateCoinStrip(state.realtimePrice);

                            const msg =
                                `📊 صفقة ${signal.type} ${signal.symbol} ${result === 'win' ? '✅ ربح' : '❌ خسارة'} بنسبة ${profitLoss.toFixed(2)}%`;
                            NotificationManager.send('انتهاء الصفقة', msg, { signal });
                        } else {
                            // Check again later
                            setTimeout(check, 60000); // check every minute
                        }
                    };

                    // First check after 2 minutes to allow price to move
                    setTimeout(check, 120000);
                }

                selectSymbol(symbol) {
                    if (symbol === state.currentSymbol) return;
                    state.currentSymbol = symbol;
                    document.getElementById('chartTitle').textContent = DISPLAY_SYMBOLS[symbol] || symbol;

                    // Update active state in coin strip
                    document.querySelectorAll('.coin-item').forEach(el => {
                        el.classList.toggle('active', el.dataset.symbol === symbol);
                    });

                    // Update chart
                    this._updateChart();

                    // Update signals to show only this symbol's signals
                    const symbolSignals = state.signals.filter(s => s.symbol === symbol);
                    UIManager.updateSignals(symbolSignals);

                    // Update price display
                    const data = state.realtimePrice[symbol];
                    if (data) {
                        UIManager.updateChartPrice(data.price, data.change);
                    }

                    UIManager.showToast(`📈 ${DISPLAY_SYMBOLS[symbol] || symbol}`, 'info');
                }

                _logError(context, subject, error) {
                    const entry = {
                        time: Date.now(),
                        context,
                        subject,
                        message: error?.message || String(error),
                        stack: error?.stack || ''
                    };
                    state.errorLogs.unshift(entry);
                    if (state.errorLogs.length > 50) state.errorLogs.pop();
                    StorageManager.saveErrorLogs(state.errorLogs);
                }
            }

            // ============================================================
            // BOOTSTRAP
            // ============================================================
            const AppInstance = new App();

            // Handle DOM ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', () => {
                    AppInstance.init().catch(e => console.error('Init error:', e));
                });
            } else {
                AppInstance.init().catch(e => console.error('Init error:', e));
            }

            // Expose for debugging
            window.App = AppInstance;
            window.state = state;

            // Handle errors globally
            window.addEventListener('error', (e) => {
                console.error('Global error:', e);
                AppInstance._logError('global', 'window', e);
            });

            window.addEventListener('unhandledrejection', (e) => {
                console.error('Unhandled rejection:', e);
                AppInstance._logError('unhandledRejection', 'promise', e);
            });

            // Connection status
            window.addEventListener('online', () => {
                UIManager.showToast('🌐 تم استعادة الاتصال بالإنترنت', 'success');
                document.getElementById('dataStatus').textContent = '✅ متصل';
                AppInstance._loadAllData().then(() => AppInstance._updateChart());
            });

            window.addEventListener('offline', () => {
                UIManager.showToast('⚠️ انقطع الاتصال بالإنترنت', 'error');
                document.getElementById('dataStatus').textContent = '⚠️ غير متصل';
            });

            console.log('🚀 ProTrade PWA loaded (fixed targets)');

        })();
    </script>
