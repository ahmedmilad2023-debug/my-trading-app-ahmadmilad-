<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1e1e2f">
    <meta name="description" content="تطبيق تحليل صفقات التداول - Supply & Demand مع CVD">
    <title>تداول - Supply & Demand</title>
    <link rel="manifest" href="data:application/json,{%22name%22:%22تداول%20Supply%20%26%20Demand%22,%22short_name%22:%22تداول%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%231e1e2f%22,%22theme_color%22:%22%231e1e2f%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,<svg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'><text%20y='.9em'%20font-size='90'>📈</text></svg>%22,%22sizes%22:%22192x192%22,%22type%22:%22image/svg+xml%22}]}">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e2f;
            color: #e0e0e0;
            overflow-x: hidden;
            padding: 12px;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            text-align: center;
            color: #f0b90b;
            letter-spacing: 1px;
        }
        .card {
            background: #2a2a3f;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            border: 1px solid #3a3a55;
        }
        .settings-toggle {
            background: #3a3a55;
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
            display: inline-block;
            margin-bottom: 12px;
        }
        .settings-toggle:hover {
            background: #4a4a6f;
        }
        .settings-panel {
            display: none;
            background: #25253a;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            border: 1px solid #444466;
        }
        .settings-panel.open {
            display: block;
        }
        .settings-panel label {
            display: block;
            margin: 8px 0 4px;
            font-size: 0.85rem;
            color: #aaa;
        }
        .settings-panel input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #1a1a2e;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
        }
        .settings-panel input:focus {
            border-color: #f0b90b;
        }
        .settings-panel .btn-save {
            background: #f0b90b;
            border: none;
            color: #1e1e2f;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
            width: 100%;
            font-size: 1rem;
        }
        .signal-card {
            background: #2f2f48;
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 14px;
            border-left: 6px solid #f0b90b;
            position: relative;
            transition: 0.2s;
        }
        .signal-card .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .signal-card .symbol {
            font-weight: bold;
            font-size: 1.2rem;
            color: #f0b90b;
        }
        .signal-card .time {
            font-size: 0.75rem;
            color: #999;
        }
        .signal-card .price-info {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 8px 0;
        }
        .signal-card .price-info span {
            background: #1a1a2e;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .signal-card .analysis {
            background: #1a1a2e;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin: 8px 0;
            border-right: 3px solid #f0b90b;
            color: #ccc;
        }
        .signal-card .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            align-items: center;
        }
        .signal-card .actions button {
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
            background: #3a3a55;
            color: #fff;
        }
        .signal-card .actions button.share {
            background: #0088cc;
        }
        .signal-card .actions button.alert-toggle {
            background: #f0b90b;
            color: #1e1e2f;
        }
        .signal-card .actions button.alert-toggle.active {
            background: #e74c3c;
            color: #fff;
        }
        .signal-card .actions button.delete {
            background: #e74c3c;
        }
        .signal-card .notes {
            margin-top: 10px;
        }
        .signal-card .notes textarea {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #1a1a2e;
            color: #fff;
            resize: vertical;
            font-size: 0.8rem;
            min-height: 50px;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }
        .empty-state p {
            margin-top: 8px;
        }
        #tradingview {
            margin-top: 20px;
            border-radius: 14px;
            overflow: hidden;
            background: #2a2a3f;
            padding: 4px;
        }
        #tradingview iframe {
            width: 100%;
            height: 400px;
            border: none;
            border-radius: 12px;
        }
        .status-badge {
            display: inline-block;
            background: #2a2a3f;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #aaa;
            margin-top: 4px;
        }
        .error-msg {
            background: #3f1a1a;
            padding: 12px;
            border-radius: 10px;
            color: #ff6b6b;
            font-size: 0.85rem;
            margin: 8px 0;
            display: none;
        }
        @media (max-width: 480px) {
            body { padding: 8px; }
            .signal-card .price-info span { font-size: 0.75rem; padding: 2px 10px; }
            .signal-card .actions button { font-size: 0.7rem; padding: 4px 10px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📈 Supply & Demand</h1>
    <button class="settings-toggle" id="settingsToggle">⚙️ الإعدادات</button>
    <div class="settings-panel" id="settingsPanel">
        <label>🔑 توكن بوت تليجرام</label>
        <input type="text" id="telegramToken" placeholder="مثال: 123456:ABC-DEF" />
        <label>🆔 معرف الدردشة (Chat ID)</label>
        <input type="text" id="telegramChatId" placeholder="مثال: -100123456789" />
        <button class="btn-save" id="saveSettings">💾 حفظ الإعدادات</button>
        <div style="margin-top:8px;font-size:0.75rem;color:#888;">* يتم حفظها محلياً</div>
    </div>

    <div id="signalsContainer">
        <div class="empty-state" id="emptyState">
            <div style="font-size:3rem;">📊</div>
            <p>بانتظار الإشارات...</p>
            <span class="status-badge" id="statusBadge">🔄 جاري الاتصال بـ Binance</span>
        </div>
    </div>

    <div id="tradingview">
        <iframe src="https://www.tradingview.com/widgetembed/?frameElementId=tradingview&symbol=BINANCE%3ABTCUSDT&interval=60&theme=dark&autosize=1&studies=%5B%5D" allowfullscreen></iframe>
    </div>
    <div id="errorMsg" class="error-msg"></div>
</div>

<script>
    (function() {
        'use strict';

        // ---------- إعدادات التخزين ----------
        const STORAGE_KEY = 'tradeAppSettings';
        const SIGNALS_KEY = 'tradeAppSignals';
        let settings = {
            telegramToken: '',
            telegramChatId: ''
        };
        let signals = []; // مصفوفة الإشارات
        let tradeIdCounter = 0;

        // عناصر DOM
        const signalsContainer = document.getElementById('signalsContainer');
        const emptyState = document.getElementById('emptyState');
        const statusBadge = document.getElementById('statusBadge');
        const errorMsg = document.getElementById('errorMsg');
        const settingsToggle = document.getElementById('settingsToggle');
        const settingsPanel = document.getElementById('settingsPanel');
        const telegramTokenInput = document.getElementById('telegramToken');
        const telegramChatIdInput = document.getElementById('telegramChatId');
        const saveSettingsBtn = document.getElementById('saveSettings');

        // ---------- تحميل الإعدادات والإشارات ----------
        function loadSettings() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    settings = { ...settings, ...parsed };
                    telegramTokenInput.value = settings.telegramToken || '';
                    telegramChatIdInput.value = settings.telegramChatId || '';
                }
            } catch (e) {}
        }
        function saveSettingsToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
        }

        function loadSignals() {
            try {
                const saved = localStorage.getItem(SIGNALS_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    signals = parsed;
                    if (signals.length > 0) {
                        tradeIdCounter = Math.max(...signals.map(s => s.tradeId || 0)) + 1;
                    }
                }
            } catch (e) {}
        }
        function saveSignalsToStorage() {
            localStorage.setItem(SIGNALS_KEY, JSON.stringify(signals));
        }

        // ---------- دوال مساعدة ----------
        function generateTradeId() {
            return ++tradeIdCounter;
        }

        function formatTime(ts) {
            const d = new Date(ts);
            return d.toLocaleString('ar-EG', { hour12: false });
        }

        // ---------- إشعارات المتصفح (Service Worker) ----------
        async function registerServiceWorker() {
            if (!('serviceWorker' in navigator)) {
                console.warn('Service Worker غير مدعوم');
                return;
            }
            try {
                // نكتب الـ sw كـ Blob ونسجله
                const swCode = `
                    self.addEventListener('install', e => {
                        e.waitUntil(self.skipWaiting());
                    });
                    self.addEventListener('activate', e => {
                        e.waitUntil(self.clients.claim());
                    });
                    self.addEventListener('push', e => {
                        const data = e.data ? e.data.json() : {};
                        const options = {
                            body: data.body || 'إشارة تداول جديدة',
                            icon: data.icon || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">📈</text></svg>',
                            badge: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">📈</text></svg>',
                            vibrate: [200, 100, 200],
                            tag: data.tag || 'trade-signal',
                            requireInteraction: true,
                        };
                        e.waitUntil(self.registration.showNotification(data.title || 'إشارة تداول', options));
                    });
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                const registration = await navigator.serviceWorker.register(swUrl);
                console.log('Service Worker مسجل');
                return registration;
            } catch (err) {
                console.error('فشل تسجيل Service Worker:', err);
            }
        }

        async function sendBrowserNotification(title, body, tag) {
            if (!('serviceWorker' in navigator) || !('Notification' in window)) {
                console.warn('الإشعارات غير مدعومة');
                return;
            }
            if (Notification.permission === 'granted') {
                try {
                    const registration = await navigator.serviceWorker.ready;
                    registration.showNotification(title, {
                        body: body,
                        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">📈</text></svg>',
                        tag: tag || 'trade-signal',
                        requireInteraction: true,
                        vibrate: [200, 100, 200],
                    });
                } catch (e) {
                    console.error(e);
                }
            } else if (Notification.permission === 'default') {
                Notification.requestPermission();
            }
        }

        // ---------- إرسال إلى تليجرام ----------
        async function sendTelegramMessage(text) {
            if (!settings.telegramToken || !settings.telegramChatId) {
                console.warn('تليجرام غير مهيأ');
                return false;
            }
            const url = `https://api.telegram.org/bot${settings.telegramToken}/sendMessage`;
            try {
                const resp = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: settings.telegramChatId,
                        text: text,
                        parse_mode: 'HTML'
                    })
                });
                const data = await resp.json();
                if (!data.ok) {
                    console.error('خطأ تليجرام:', data);
                    return false;
                }
                return true;
            } catch (e) {
                console.error('فشل إرسال تليجرام:', e);
                return false;
            }
        }

        // ---------- استراتيجية Supply & Demand + CVD ----------
        // سنقوم بجلب بيانات Kline (1 دقيقة) من Binance لعدد من العملات
        const SYMBOLS = ['BTCUSDT', 'ETHUSDT', 'SOLUSDT', 'ADAUSDT', 'XRPUSDT'];
        let lastSignalPerSymbol = {}; // لتجنب التكرار

        async function fetchKlines(symbol, interval = '1m', limit = 100) {
            const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`;
            try {
                const resp = await fetch(url);
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const data = await resp.json();
                return data;
            } catch (e) {
                throw new Error(`فشل جلب بيانات ${symbol}: ${e.message}`);
            }
        }

        // حساب CVD تقريبي: مجموع حجم الشموع الصاعدة - حجم الشموع الهابطة
        function computeCVD(klines) {
            let cvd = 0;
            for (let i = 0; i < klines.length; i++) {
                const open = parseFloat(klines[i][1]);
                const close = parseFloat(klines[i][4]);
                const volume = parseFloat(klines[i][5]);
                if (close > open) {
                    cvd += volume;
                } else if (close < open) {
                    cvd -= volume;
                }
            }
            return cvd;
        }

        // تحديد مستويات Supply & Demand: نقاط القمة والقاع الأخيرة
        function findSupportResistance(klines) {
            const highs = klines.map(k => parseFloat(k[2]));
            const lows = klines.map(k => parseFloat(k[3]));
            const closes = klines.map(k => parseFloat(k[4]));
            // نأخذ أعلى قمة وأدنى قاع في آخر 30 شمعة
            const window = 30;
            const recentHighs = highs.slice(-window);
            const recentLows = lows.slice(-window);
            const maxHigh = Math.max(...recentHighs);
            const minLow = Math.min(...recentLows);
            const currentPrice = closes[closes.length - 1];
            // نحدد مناطق العرض (مقاومة) والطلب (دعم) بنسبة 0.5% حول القمة/القاع
            const supplyZone = maxHigh * 1.002; // فوق القمة بقليل
            const demandZone = minLow * 0.998; // تحت القاع بقليل
            return { supplyZone, demandZone, currentPrice, maxHigh, minLow };
        }

        // توليد إشارة بناءً على الاستراتيجية
        async function scanSymbol(symbol) {
            try {
                const klines = await fetchKlines(symbol);
                if (!klines || klines.length < 30) return null;

                const cvd = computeCVD(klines);
                const { supplyZone, demandZone, currentPrice, maxHigh, minLow } = findSupportResistance(klines);

                // شروط الدخول:
                // إذا كان السعر فوق منطقة العرض (Supply) مع CVD موجب قوي -> إشارة بيع (Short)
                // إذا كان السعر تحت منطقة الطلب (Demand) مع CVD سالب قوي -> إشارة شراء (Long)
                // نبسط: نستخدم عتبة CVD 0.5 * متوسط الحجم
                const avgVolume = klines.slice(-20).reduce((sum, k) => sum + parseFloat(k[5]), 0) / 20;
                const threshold = avgVolume * 0.3;

                let signalType = null;
                let reason = '';
                let tp = 0, sl = 0;

                if (currentPrice > supplyZone && cvd > threshold) {
                    signalType = 'SELL';
                    reason = `السعر فوق منطقة العرض (${supplyZone.toFixed(2)}) مع CVD إيجابي قوي (${cvd.toFixed(0)})، اتجاه هبوط متوقع.`;
                    tp = minLow * 0.99; // هدف قريب
                    sl = supplyZone * 1.02; // وقف فوق المقاومة
                } else if (currentPrice < demandZone && cvd < -threshold) {
                    signalType = 'BUY';
                    reason = `السعر تحت منطقة الطلب (${demandZone.toFixed(2)}) مع CVD سلبي قوي (${cvd.toFixed(0)})، اتجاه صعود متوقع.`;
                    tp = maxHigh * 1.01;
                    sl = demandZone * 0.98;
                }

                if (!signalType) return null;

                // التحقق من عدم وجود إشارة مفتوحة لنفس العملة
                const existing = signals.find(s => s.symbol === symbol && s.status === 'active');
                if (existing) {
                    // إذا كانت موجودة ولم تنتهِ، لا نرسل إشارة جديدة
                    return null;
                }

                const tradeId = generateTradeId();
                const now = Date.now();
                const signal = {
                    tradeId: tradeId,
                    symbol: symbol,
                    type: signalType,
                    entryPrice: currentPrice,
                    tp: tp,
                    sl: sl,
                    timestamp: now,
                    reason: reason,
                    status: 'active', // active, closed
                    notes: '',
                    alertEnabled: true,
                };
                return signal;
            } catch (e) {
                console.error(`خطأ في فحص ${symbol}:`, e);
                return null;
            }
        }

        // ---------- إضافة إشارة ومعالجة التنبيهات ----------
        async function addSignal(signal) {
            if (!signal) return;
            signals.push(signal);
            saveSignalsToStorage();
            renderSignals();

            // إرسال إشعار متصفح
            const title = `🔔 إشارة ${signal.symbol}`;
            const body = `${signal.type === 'BUY' ? 'شراء' : 'بيع'} عند ${signal.entryPrice.toFixed(2)} | الهدف: ${signal.tp.toFixed(2)} | الوقف: ${signal.sl.toFixed(2)}`;
            sendBrowserNotification(title, body, `trade-${signal.tradeId}`);

            // إرسال إلى تليجرام
            const msg = `<b>🔔 إشارة تداول جديدة</b>\n\n` +
                `🪙 العملة: ${signal.symbol}\n` +
                `📈 الاتجاه: ${signal.type === 'BUY' ? 'شراء (Long)' : 'بيع (Short)'}\n` +
                `💰 سعر الدخول: ${signal.entryPrice.toFixed(2)}\n` +
                `🎯 الهدف: ${signal.tp.toFixed(2)}\n` +
                `🛑 وقف الخسارة: ${signal.sl.toFixed(2)}\n` +
                `📊 التحليل: ${signal.reason}\n` +
                `⏰ الوقت: ${formatTime(signal.timestamp)}`;
            await sendTelegramMessage(msg);
        }

        // ---------- عرض الإشارات ----------
        function renderSignals() {
            const activeSignals = signals.filter(s => s.status === 'active');
            const container = signalsContainer;

            // إخفاء الرسالة الفارغة
            if (activeSignals.length === 0) {
                emptyState.style.display = 'block';
                // نزيل أي بطاقات سابقة
                const cards = container.querySelectorAll('.signal-card');
                cards.forEach(c => c.remove());
                statusBadge.textContent = '🔄 في انتظار الإشارات...';
                return;
            }
            emptyState.style.display = 'none';
            statusBadge.textContent = `📊 ${activeSignals.length} إشارة نشطة`;

            // إزالة البطاقات القديمة (نحتفظ بالبطاقات الموجودة إذا أمكن لتجنب الوميض لكننا سنعيد بناء)
            const cards = container.querySelectorAll('.signal-card');
            cards.forEach(c => c.remove());

            // ترتيب تنازلي حسب الوقت
            activeSignals.sort((a, b) => b.timestamp - a.timestamp);

            for (const sig of activeSignals) {
                const card = document.createElement('div');
                card.className = 'signal-card';
                card.dataset.tradeId = sig.tradeId;
                card.style.borderLeftColor = sig.type === 'BUY' ? '#2ecc71' : '#e74c3c';

                const header = document.createElement('div');
                header.className = 'header';
                header.innerHTML = `
                    <span class="symbol">${sig.symbol} ${sig.type === 'BUY' ? '📈' : '📉'}</span>
                    <span class="time">${formatTime(sig.timestamp)}</span>
                `;
                card.appendChild(header);

                const priceInfo = document.createElement('div');
                priceInfo.className = 'price-info';
                priceInfo.innerHTML = `
                    <span>💰 الدخول: ${sig.entryPrice.toFixed(2)}</span>
                    <span>🎯 الهدف: ${sig.tp.toFixed(2)}</span>
                    <span>🛑 الوقف: ${sig.sl.toFixed(2)}</span>
                `;
                card.appendChild(priceInfo);

                const analysis = document.createElement('div');
                analysis.className = 'analysis';
                analysis.textContent = sig.reason || 'تحليل غير متوفر';
                card.appendChild(analysis);

                const actions = document.createElement('div');
                actions.className = 'actions';

                // زر مشاركة
                const shareBtn = document.createElement('button');
                shareBtn.className = 'share';
                shareBtn.textContent = '📤 مشاركة';
                shareBtn.addEventListener('click', () => {
                    const text = `إشارة ${sig.symbol} ${sig.type === 'BUY' ? 'شراء' : 'بيع'}\nالدخول: ${sig.entryPrice.toFixed(2)}\nالهدف: ${sig.tp.toFixed(2)}\nالوقف: ${sig.sl.toFixed(2)}\nالتحليل: ${sig.reason}`;
                    if (navigator.share) {
                        navigator.share({ title: 'إشارة تداول', text: text });
                    } else {
                        navigator.clipboard.writeText(text).then(() => {
                            alert('تم نسخ النص للحافظة');
                        }).catch(() => {
                            prompt('انسخ النص:', text);
                        });
                    }
                });
                actions.appendChild(shareBtn);

                // زر إلغاء/تفعيل التنبيه
                const alertToggle = document.createElement('button');
                alertToggle.className = 'alert-toggle' + (sig.alertEnabled ? ' active' : '');
                alertToggle.textContent = sig.alertEnabled ? '🔔 تفعيل' : '🔕 إلغاء';
                alertToggle.addEventListener('click', () => {
                    sig.alertEnabled = !sig.alertEnabled;
                    alertToggle.textContent = sig.alertEnabled ? '🔔 تفعيل' : '🔕 إلغاء';
                    alertToggle.classList.toggle('active');
                    saveSignalsToStorage();
                });
                actions.appendChild(alertToggle);

                // زر إغلاق الصفقة (إنهاء)
                const closeBtn = document.createElement('button');
                closeBtn.className = 'delete';
                closeBtn.textContent = '❌ إنهاء';
                closeBtn.addEventListener('click', () => {
                    if (confirm('هل أنت متأكد من إنهاء هذه الصفقة؟')) {
                        sig.status = 'closed';
                        saveSignalsToStorage();
                        renderSignals();
                    }
                });
                actions.appendChild(closeBtn);

                card.appendChild(actions);

                // مربع الملاحظات
                const notesDiv = document.createElement('div');
                notesDiv.className = 'notes';
                const textarea = document.createElement('textarea');
                textarea.placeholder = 'ملاحظاتك الشخصية...';
                textarea.value = sig.notes || '';
                textarea.addEventListener('input', () => {
                    sig.notes = textarea.value;
                    saveSignalsToStorage();
                });
                notesDiv.appendChild(textarea);
                card.appendChild(notesDiv);

                container.appendChild(card);
            }
        }

        // ---------- المسح الدوري للعملات ----------
        let scanInterval = null;
        async function scanAllSymbols() {
            for (const symbol of SYMBOLS) {
                try {
                    const signal = await scanSymbol(symbol);
                    if (signal) {
                        await addSignal(signal);
                    }
                } catch (e) {
                    console.error('خطأ في فحص ' + symbol, e);
                    showError(`فشل فحص ${symbol}: ${e.message}`);
                }
            }
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            setTimeout(() => {
                errorMsg.style.display = 'none';
            }, 5000);
        }

        // ---------- بدء التشغيل ----------
        async function init() {
            loadSettings();
            loadSignals();
            renderSignals();

            // طلب إذن الإشعارات
            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }

            // تسجيل Service Worker
            await registerServiceWorker();

            // إعدادات UI
            settingsToggle.addEventListener('click', () => {
                settingsPanel.classList.toggle('open');
            });

            saveSettingsBtn.addEventListener('click', () => {
                settings.telegramToken = telegramTokenInput.value.trim();
                settings.telegramChatId = telegramChatIdInput.value.trim();
                saveSettingsToStorage();
                alert('تم حفظ الإعدادات');
            });

            // بدء المسح الدوري (كل 30 ثانية)
            scanAllSymbols(); // أول مرة فوراً
            scanInterval = setInterval(scanAllSymbols, 30000);

            // إعادة عرض الإشارات عند تغيير الإشارات (بالفعل يتم الحفظ)
            // نضيف مراقب للتخزين؟ لا، سنعتمد على التحديث عند كل إضافة.
        }

        // تنظيف عند الخروج
        window.addEventListener('beforeunload', () => {
            if (scanInterval) clearInterval(scanInterval);
        });

        // استدعاء التهيئة
        init();

    })();
</script>
</body>
</html>
