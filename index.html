<body>
<div class="container">

    <button class="settings-toggle" id="settingsToggle">⚙️ الإعدادات</button>

        <input type="text" id="telegramToken" placeholder="مثال: 123456:ABC-DEF" />
        <label>🆔 معرف الدردشة (Chat ID)</label>

    <div id="signalsContainer">

        <iframe src="https://www.tradingview.com/widgetembed/?frameElementId=tradingview&symbol=BINANCE%3ABTCUSDT&interval=60&theme=dark&autosize=1&studies=%5B%5D" allowfullscreen></iframe>
    </div>

</div>

<script>
    (function() {
        'use strict';

        // ---------- إعدادات التخزين ----------
        const STORAGE_KEY = 'tradeAppSettings';
        const SIGNALS_KEY = 'tradeAppSignals';
        let settings = {
            telegramToken: '',
            telegramChatId: ''
        };
        let signals = []; 
        let tradeIdCounter = 0;

        // عناصر DOM
        const signalsContainer = document.getElementById('signalsContainer');
        const emptyState = document.getElementById('emptyState');
        const statusBadge = document.getElementById('statusBadge');
        const errorMsg = document.getElementById('errorMsg');
        const settingsToggle = document.getElementById('settingsToggle');
        const settingsPanel = document.getElementById('settingsPanel');
        const telegramTokenInput = document.getElementById('telegramToken');
        const telegramChatIdInput = document.getElementById('telegramChatId');
        const saveSettingsBtn = document.getElementById('saveSettings');
        const scanBtn = document.getElementById('scanBtn');
        const analyzeBtn = document.getElementById('analyzeBtn');

        // ---------- تحميل الإعدادات والإشارات ----------
        function loadSettings() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    settings = { ...settings, ...parsed };
                    telegramTokenInput.value = settings.telegramToken || '';
                    telegramChatIdInput.value = settings.telegramChatId || '';
                }
            } catch (e) {}
        }
        function saveSettingsToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
        }

        function loadSignals() {
            try {
                const saved = localStorage.getItem(SIGNALS_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    signals = parsed;
                    if (signals.length > 0) {
                        tradeIdCounter = Math.max(...signals.map(s => s.tradeId || 0)) + 1;
                    }
                }
            } catch (e) {}
        }
        function saveSignalsToStorage() {
            localStorage.setItem(SIGNALS_KEY, JSON.stringify(signals));
        }

        // ---------- دوال مساعدة ----------
        function generateTradeId() {
            return ++tradeIdCounter;
        }

        function formatTime(ts) {
            const d = new Date(ts);
            return d.toLocaleString('ar-EG', { hour12: false });
        }

        // ---------- إشعارات المتصفح (Service Worker) ----------
        async function registerServiceWorker() {
            if (!('serviceWorker' in navigator)) {
                console.warn('Service Worker غير مدعوم');
                return;
            }
            try {
                const swCode = `
                    self.addEventListener('install', e => {
                        e.waitUntil(self.skipWaiting());
                    });
                    self.addEventListener('activate', e => {
                        e.waitUntil(self.clients.claim());
                    });
                    self.addEventListener('push', e => {
                        const data = e.data ? e.data.json() : {};
                        const options = {
                            body: data.body || 'إشارة تداول جديدة',
                            icon: data.icon || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">📈</text></svg>',
                            badge: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">📈</text></svg>',
                            vibrate: [200, 100, 200],
                            tag: data.tag || 'trade-signal',
                            requireInteraction: true,
                        };
                        e.waitUntil(self.registration.showNotification(data.title || 'إشارة تداول', options));
                    });
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                const registration = await navigator.serviceWorker.register(swUrl);
                console.log('Service Worker مسجل');
                return registration;
            } catch (err) {
                console.error('فشل تسجيل Service Worker:', err);
            }
        }

        async function sendBrowserNotification(title, body, tag) {
            if (!('serviceWorker' in navigator) || !('Notification' in window)) {
                console.warn('الإشعارات غير مدعومة');
                return;
            }
            if (Notification.permission === 'granted') {
                try {
                    const registration = await navigator.serviceWorker.ready;
                    registration.showNotification(title, {
                        body: body,
                        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">📈</text></svg>',
                        tag: tag || 'trade-signal',
                        requireInteraction: true,
                        vibrate: [200, 100, 200],
                    });
                } catch (e) {
                    console.error(e);
                }
            } else if (Notification.permission === 'default') {
                Notification.requestPermission();
            }
        }

        // ---------- إرسال إلى تليجرام ----------
        async function sendTelegramMessage(text) {
            if (!settings.telegramToken || !settings.telegramChatId) {
                console.warn('تليجرام غير مهيأ');
                return false;
            }
            const url = `https://api.telegram.org/bot${settings.telegramToken}/sendMessage`;
            try {
                const resp = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: settings.telegramChatId,
                        text: text,
                        parse_mode: 'HTML'
                    })
                });
                const data = await resp.json();
                if (!data.ok) {
                    console.error('خطأ تليجرام:', data);
                    return false;
                }
                return true;
            } catch (e) {
                console.error('فشل إرسال تليجرام:', e);
                return false;
            }
        }

        // ---------- حساب ADX ----------
        function calculateADX(klines) {
            const period = 14;
            if (klines.length < period + 1) return null;

            const high = klines.map(k => parseFloat(k[2]));
            const low = klines.map(k => parseFloat(k[3]));
            const close = klines.map(k => parseFloat(k[4]));

            const plusDM = [];
            const minusDM = [];
            const tr = [];
            for (let i = 1; i < high.length; i++) {
                const upMove = high[i] - high[i-1];
                const downMove = low[i-1] - low[i];
                let pm = 0, mm = 0;
                if (upMove > downMove && upMove > 0) pm = upMove;
                if (downMove > upMove && downMove > 0) mm = downMove;
                plusDM.push(pm);
                minusDM.push(mm);
                const h = high[i];
                const l = low[i];
                const c = close[i-1];
                const tr1 = h - l;
                const tr2 = Math.abs(h - c);
                const tr3 = Math.abs(l - c);
                tr.push(Math.max(tr1, tr2, tr3));
            }

            function sma(data, period) {
                const result = [];
                for (let i = 0; i < data.length - period + 1; i++) {
                    let sum = 0;
                    for (let j = 0; j < period; j++) {
                        sum += data[i+j];
                    }
                    result.push(sum / period);
                }
                return result;
            }

            if (plusDM.length < period) return null;

            const smaPlusDM = sma(plusDM, period);
            const smaMinusDM = sma(minusDM, period);
            const smaTR = sma(tr, period);

            if (smaPlusDM.length === 0 || smaMinusDM.length === 0 || smaTR.length === 0) return null;

            const plusDI = smaPlusDM.map((v, i) => (v / smaTR[i]) * 100);
            const minusDI = smaMinusDM.map((v, i) => (v / smaTR[i]) * 100);

            const dx = [];
            for (let i = 0; i < plusDI.length; i++) {
                const diSum = plusDI[i] + minusDI[i];
                if (diSum === 0) {
                    dx.push(0);
                } else {
                    dx.push(Math.abs(plusDI[i] - minusDI[i]) / diSum * 100);
                }
            }

            if (dx.length < period) return null;
            const adx = sma(dx, period);
            return adx[adx.length - 1];
        }

        // ---------- تحديد اتجاه البيتكوين (1 ساعة) ----------
        async function getBitcoinDirection() {
            try {
                const klines = await fetchKlines('BTCUSDT', '1h', 50);
                if (!klines || klines.length < 20) return null;
                // نأخذ متوسط سعر آخر 12 شمعة (نصف يوم) ونقارنه بـ 12 شمعة سابقة
                const closes = klines.map(k => parseFloat(k[4]));
                const recent = closes.slice(-12);
                const prev = closes.slice(-24, -12);
                if (recent.length < 12 || prev.length < 12) return null;
                const avgRecent = recent.reduce((a,b) => a+b, 0) / recent.length;
                const avgPrev = prev.reduce((a,b) => a+b, 0) / prev.length;
                if (avgRecent > avgPrev) return 'UP';
                else if (avgRecent < avgPrev) return 'DOWN';
                else return null;
            } catch (e) {
                console.error('خطأ في تحديد اتجاه البيتكوين:', e);
                return null;
            }
        }

        // ---------- استراتيجية Supply & Demand + CVD + ADX + اتجاه BTC ----------
        // 10 عملات عالية الارتباط بالبيتكوين
        const SYMBOLS = ['BTCUSDT', 'ETHUSDT', 'SOLUSDT', 'ADAUSDT', 'XRPUSDT', 'DOGEUSDT', 'AVAXUSDT', 'DOTUSDT', 'MATICUSDT', 'LTCUSDT', 'BCHUSDT'];

        async function fetchKlines(symbol, interval = '1m', limit = 100) {
            const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`;
            try {
                const resp = await fetch(url);
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const data = await resp.json();
                return data;
            } catch (e) {
                throw new Error(`فشل جلب بيانات ${symbol}: ${e.message}`);
            }
        }

        function computeCVD(klines) {
            let cvd = 0;
            for (let i = 0; i < klines.length; i++) {
                const open = parseFloat(klines[i][1]);
                const close = parseFloat(klines[i][4]);
                const volume = parseFloat(klines[i][5]);
                if (close > open) {
                    cvd += volume;
                } else if (close < open) {
                    cvd -= volume;
                }
            }
            return cvd;
        }

        function findSupportResistance(klines) {
            const highs = klines.map(k => parseFloat(k[2]));
            const lows = klines.map(k => parseFloat(k[3]));
            const closes = klines.map(k => parseFloat(k[4]));
            const window = 30;
            const recentHighs = highs.slice(-window);
            const recentLows = lows.slice(-window);
            const maxHigh = Math.max(...recentHighs);
            const minLow = Math.min(...recentLows);
            const currentPrice = closes[closes.length - 1];
            const supplyZone = maxHigh * 1.002;
            const demandZone = minLow * 0.998;
            return { supplyZone, demandZone, currentPrice, maxHigh, minLow };
        }

        async function scanSymbol(symbol, btcDirection) {
            try {
                // إذا كان الرمز هو BTC نفسه نتعامل معه بشكل منفصل أو نسمح به
                // نطبق الشروط نفسها ولكن نعتمد على اتجاه البيتكوين العام
                const klines = await fetchKlines(symbol);
                if (!klines || klines.length < 30) return null;

                const adx = calculateADX(klines);
                if (adx === null) return null;
                if (adx <= 25) return null;

                const cvd = computeCVD(klines);
                const { supplyZone, demandZone, currentPrice, maxHigh, minLow } = findSupportResistance(klines);

                const avgVolume = klines.slice(-20).reduce((sum, k) => sum + parseFloat(k[5]), 0) / 20;
                const threshold = avgVolume * 0.3;

                let signalType = null;
                let reason = '';
                let tp = 0, sl = 0;

                // تحديد إشارة محتملة
                let potentialType = null;
                let potentialReason = '';
                if (currentPrice > supplyZone && cvd > threshold) {
                    potentialType = 'SELL';
                    potentialReason = `السعر فوق منطقة العرض (${supplyZone.toFixed(2)}) مع CVD إيجابي (${cvd.toFixed(0)}) و ADX (${adx.toFixed(1)}) > 25`;
                } else if (currentPrice < demandZone && cvd < -threshold) {
                    potentialType = 'BUY';
                    potentialReason = `السعر تحت منطقة الطلب (${demandZone.toFixed(2)}) مع CVD سلبي (${cvd.toFixed(0)}) و ADX (${adx.toFixed(1)}) > 25`;
                }

                if (!potentialType) return null;

                // التحقق من التوافق مع اتجاه البيتكوين
                if (btcDirection === 'UP' && potentialType === 'SELL') {
                    // غير متوافق: البيتكوين صاعد فلا نبيع
                    return null;
                }
                if (btcDirection === 'DOWN' && potentialType === 'BUY') {
                    // غير متوافق: البيتكوين هابط فلا نشتري
                    return null;
                }

                // إذا كان البيتكوين مستقراً (لا اتجاه) نسمح بأي إشارة لكن نفضل عدم الدخول
                // لكن سنسمح بها لأننا قد نغتنم الفرصة
                // لكن الشرط هو أن تكون متوافقة، إذا كان الاتجاه غير واضح نسمح بها

                // إذا وصلنا هنا فالإشارة متوافقة
                signalType = potentialType;
                reason = potentialReason + ` واتجاه البيتكوين ${btcDirection === 'UP' ? 'صاعد' : btcDirection === 'DOWN' ? 'هابط' : 'محايد'}، متوافق.`;

                // تحديد الهدف 2% ووقف 0.5%
                const entryPrice = currentPrice;
                if (signalType === 'BUY') {
                    tp = entryPrice * 1.02;  // +2%
                    sl = entryPrice * 0.995; // -0.5%
                } else { // SELL
                    tp = entryPrice * 0.98;  // -2%
                    sl = entryPrice * 1.005; // +0.5%
                }

                // التحقق من عدم وجود إشارة مفتوحة لنفس العملة
                const existing = signals.find(s => s.symbol === symbol && s.status === 'active');
                if (existing) {
                    return null;
                }

                const tradeId = generateTradeId();
                const now = Date.now();
                const signal = {
                    tradeId: tradeId,
                    symbol: symbol,
                    type: signalType,
                    entryPrice: entryPrice,
                    tp: tp,
                    sl: sl,
                    timestamp: now,
                    reason: reason,
                    status: 'active',
                    notes: '',
                    alertEnabled: true,
                    adx: adx,
                    btcDirection: btcDirection,
                };
                return signal;
            } catch (e) {
                console.error(`خطأ في فحص ${symbol}:`, e);
                return null;
            }
        }

        // ---------- إضافة إشارة ومعالجة التنبيهات ----------
        async function addSignal(signal) {
            if (!signal) return;
            signals.push(signal);
            saveSignalsToStorage();
            renderSignals();

            const title = `🔔 إشارة ${signal.symbol}`;
            const body = `${signal.type === 'BUY' ? 'شراء' : 'بيع'} عند ${signal.entryPrice.toFixed(2)} | الهدف: ${signal.tp.toFixed(2)} | الوقف: ${signal.sl.toFixed(2)} | ADX: ${signal.adx.toFixed(1)}`;
            sendBrowserNotification(title, body, `trade-${signal.tradeId}`);

            const msg = `<b>🔔 إشارة تداول جديدة</b>\n\n` +
                `🪙 العملة: ${signal.symbol}\n` +
                `📈 الاتجاه: ${signal.type === 'BUY' ? 'شراء (Long)' : 'بيع (Short)'}\n` +
                `💰 سعر الدخول: ${signal.entryPrice.toFixed(2)}\n` +
                `🎯 الهدف (2%): ${signal.tp.toFixed(2)}\n` +
                `🛑 وقف الخسارة (0.5%): ${signal.sl.toFixed(2)}\n` +
                `📊 ADX: ${signal.adx.toFixed(1)} (فوق 25)\n` +
                `📊 اتجاه البيتكوين: ${signal.btcDirection === 'UP' ? 'صاعد' : signal.btcDirection === 'DOWN' ? 'هابط' : 'محايد'}\n` +
                `📊 التحليل: ${signal.reason}\n` +
                `⏰ الوقت: ${formatTime(signal.timestamp)}`;
            await sendTelegramMessage(msg);
        }

        // ---------- عرض الإشارات ----------
        function renderSignals() {
            const activeSignals = signals.filter(s => s.status === 'active');
            const container = signalsContainer;

            if (activeSignals.length === 0) {
                emptyState.style.display = 'block';
                const cards = container.querySelectorAll('.signal-card');
                cards.forEach(c => c.remove());
                statusBadge.textContent = '🔄 في انتظار الإشارات...';
                return;
            }
            emptyState.style.display = 'none';
            statusBadge.textContent = `📊 ${activeSignals.length} إشارة نشطة`;

            const cards = container.querySelectorAll('.signal-card');
            cards.forEach(c => c.remove());

            activeSignals.sort((a, b) => b.timestamp - a.timestamp);

            for (const sig of activeSignals) {
                const card = document.createElement('div');
                card.className = 'signal-card';
                card.dataset.tradeId = sig.tradeId;
                card.style.borderLeftColor = sig.type === 'BUY' ? '#2ecc71' : '#e74c3c';

                const header = document.createElement('div');
                header.className = 'header';
                header.innerHTML = `
                    <span class="symbol">${sig.symbol} ${sig.type === 'BUY' ? '📈' : '📉'}</span>
                    <span class="time">${formatTime(sig.timestamp)}</span>
                `;
                card.appendChild(header);

                const priceInfo = document.createElement('div');
                priceInfo.className = 'price-info';
                priceInfo.innerHTML = `
                    <span>💰 الدخول: ${sig.entryPrice.toFixed(2)}</span>
                    <span>🎯 الهدف (2%): ${sig.tp.toFixed(2)}</span>
                    <span>🛑 الوقف (0.5%): ${sig.sl.toFixed(2)}</span>
                    <span>📈 ADX: ${sig.adx ? sig.adx.toFixed(1) : 'N/A'}</span>
                `;
                card.appendChild(priceInfo);

                const analysis = document.createElement('div');
                analysis.className = 'analysis';
                analysis.textContent = sig.reason || 'تحليل غير متوفر';
                card.appendChild(analysis);

                const actions = document.createElement('div');
                actions.className = 'actions';

                // زر مشاركة
                const shareBtn = document.createElement('button');
                shareBtn.className = 'share';
                shareBtn.textContent = '📤 مشاركة';
                shareBtn.addEventListener('click', () => {
                    const text = `إشارة ${sig.symbol} ${sig.type === 'BUY' ? 'شراء' : 'بيع'}\nالدخول: ${sig.entryPrice.toFixed(2)}\nالهدف: ${sig.tp.toFixed(2)}\nالوقف: ${sig.sl.toFixed(2)}\nADX: ${sig.adx ? sig.adx.toFixed(1) : 'N/A'}\nالتحليل: ${sig.reason}`;
                    if (navigator.share) {
                        navigator.share({ title: 'إشارة تداول', text: text });
                    } else {
                        navigator.clipboard.writeText(text).then(() => {
                            alert('تم نسخ النص للحافظة');
                        }).catch(() => {
                            prompt('انسخ النص:', text);
                        });
                    }
                });
                actions.appendChild(shareBtn);

                // زر إلغاء/تفعيل التنبيه
                const alertToggle = document.createElement('button');
                alertToggle.className = 'alert-toggle' + (sig.alertEnabled ? ' active' : '');
                alertToggle.textContent = sig.alertEnabled ? '🔔 تفعيل' : '🔕 إلغاء';
                alertToggle.addEventListener('click', () => {
                    sig.alertEnabled = !sig.alertEnabled;
                    alertToggle.textContent = sig.alertEnabled ? '🔔 تفعيل' : '🔕 إلغاء';
                    alertToggle.classList.toggle('active');
                    saveSignalsToStorage();
                });
                actions.appendChild(alertToggle);

                // زر إغلاق الصفقة (إنهاء)
                const closeBtn = document.createElement('button');
                closeBtn.className = 'delete';
                closeBtn.textContent = '❌ إنهاء';
                closeBtn.addEventListener('click', () => {
                    if (confirm('هل أنت متأكد من إنهاء هذه الصفقة؟')) {
                        sig.status = 'closed';
                        saveSignalsToStorage();
                        renderSignals();
                    }
                });
                actions.appendChild(closeBtn);

                card.appendChild(actions);

                // مربع الملاحظات
                const notesDiv = document.createElement('div');
                notesDiv.className = 'notes';
                const textarea = document.createElement('textarea');
                textarea.placeholder = 'ملاحظاتك الشخصية...';
                textarea.value = sig.notes || '';
                textarea.addEventListener('input', () => {
                    sig.notes = textarea.value;
                    saveSignalsToStorage();
                });
                notesDiv.appendChild(textarea);
                card.appendChild(notesDiv);

                container.appendChild(card);
            }
        }

        // ---------- المسح الدوري و اليدوي ----------
        let scanInterval = null;
        async function scanAllSymbols() {
            // جلب اتجاه البيتكوين أولاً
            const btcDir = await getBitcoinDirection();
            if (!btcDir) {
                console.warn('لم نتمكن من تحديد اتجاه البيتكوين، سنعمل بدون شرط الاتجاه');
                // نستمر ولكن بدون تصفية الاتجاه
            }
            for (const symbol of SYMBOLS) {
                try {
                    const signal = await scanSymbol(symbol, btcDir);
                    if (signal) {
                        await addSignal(signal);
                    }
                } catch (e) {
                    console.error('خطأ في فحص ' + symbol, e);
                    showError(`فشل فحص ${symbol}: ${e.message}`);
                }
            }
        }

        async function manualAnalysis() {
            const symbol = prompt('أدخل رمز العملة (مثل BTCUSDT):', 'BTCUSDT');
            if (!symbol) return;
            try {
                const btcDir = await getBitcoinDirection();
                const signal = await scanSymbol(symbol.toUpperCase(), btcDir);
                if (signal) {
                    await addSignal(signal);
                    alert(`تم العثور على إشارة لـ ${symbol}`);
                } else {
                    alert(`لا توجد إشارة لـ ${symbol} حالياً (قد يكون ADX <= 25، أو عدم توافق مع اتجاه البيتكوين، أو عدم توفر شروط أخرى)`);
                }
            } catch (e) {
                showError(`خطأ في التحليل: ${e.message}`);
            }
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            setTimeout(() => {
                errorMsg.style.display = 'none';
            }, 5000);
        }

        // ---------- بدء التشغيل ----------
        async function init() {
            loadSettings();
            loadSignals();
            renderSignals();

            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }

            await registerServiceWorker();

            settingsToggle.addEventListener('click', () => {
                settingsPanel.classList.toggle('open');
            });

            saveSettingsBtn.addEventListener('click', () => {
                settings.telegramToken = telegramTokenInput.value.trim();
                settings.telegramChatId = telegramChatIdInput.value.trim();
                saveSettingsToStorage();
                alert('تم حفظ الإعدادات');
            });

            scanBtn.addEventListener('click', async () => {
                scanBtn.textContent = '⏳ جاري...';
                scanBtn.disabled = true;
                await scanAllSymbols();
                scanBtn.textContent = '🔍 فحص يدوي';
                scanBtn.disabled = false;
            });

            analyzeBtn.addEventListener('click', manualAnalysis);

            scanAllSymbols(); 
            scanInterval = setInterval(scanAllSymbols, 30000);
        }

        window.addEventListener('beforeunload', () => {
            if (scanInterval) clearInterval(scanInterval);
        });

        init();
    })();
</script>
</body>
</html>
