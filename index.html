<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق فيوتشرز 50x - تحليل وتنبيه</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0e14; color: #e0e6ed; }
        .app { max-width: 500px; margin: 0 auto; padding: 12px; min-height: 100vh; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1f2937; }
        header h1 { font-size: 18px; font-weight: 600; }
        .price-ticker { color: #22c55e; font-size: 20px; font-weight: bold; }
        .chart-container { height: 350px; background: #131a22; border-radius: 12px; margin: 16px 0; position: relative; overflow: hidden; }
        .chart-container canvas { width: 100%; height: 100%; }
        .trade-box { background: #1a2330; border-radius: 12px; padding: 16px; margin: 12px 0; }
        .trade-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; }
        .trade-item { background: #0b0e14; padding: 10px; border-radius: 8px; }
        .trade-item label { font-size: 10px; color: #8b9bb5; display: block; }
        .trade-item .value { font-size: 16px; font-weight: bold; }
        .green { color: #22c55e; }
        .red { color: #ef4444; }
        .btn-group { display: flex; gap: 12px; margin: 16px 0; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-buy { background: #22c55e; color: #fff; }
        .btn-sell { background: #ef4444; color: #fff; }
        .btn-share { background: #3b82f6; color: #fff; margin-top: 10px; width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .alerts { background: #1a2330; padding: 12px; border-radius: 10px; margin: 12px 0; font-size: 14px; }
        .alerts .alert-item { padding: 6px 0; border-bottom: 1px solid #1f2937; }
        .analysis { background: #1a2330; padding: 12px; border-radius: 10px; margin: 12px 0; font-size: 13px; line-height: 1.6; }
        .leverage-badge { background: #f59e0b; color: #0b0e14; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .input-group { margin: 10px 0; display: flex; gap: 8px; }
        .input-group input { flex: 1; padding: 10px; background: #0b0e14; border: 1px solid #1f2937; border-radius: 8px; color: #e0e6ed; font-size: 14px; }
        .input-group input::placeholder { color: #6b7b95; }
        @media (max-width: 400px) { .trade-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <h1>📊 FutureX 50x</h1>
            <span class="price-ticker" id="price">جاري التحميل...</span>
        </header>

        <div class="chart-container">
            <canvas id="chartCanvas"></canvas>
            <div style="position:absolute; bottom:8px; right:12px; font-size:10px; color:#6b7b95;">BTC/USDT</div>
        </div>

        <div class="input-group">
            <input type="text" id="symbolInput" value="BTCUSDT" placeholder="العملة (مثل BTCUSDT)" />
            <button class="btn btn-buy" onclick="changeSymbol()" style="padding:10px 16px; font-size:14px;">تحديث</button>
        </div>

        <div class="trade-box">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span>رافعة مالية (محاكاة)</span>
                <span class="leverage-badge">50x</span>
            </div>
            <div class="input-group" style="margin-bottom:10px;">
                <input type="number" id="quantityInput" value="0.001" step="0.001" placeholder="الكمية (BTC)" />
            </div>
            <div class="trade-grid">
                <div class="trade-item"><label>الدخول</label><div class="value" id="entry">--</div></div>
                <div class="trade-item"><label>الهدف</label><div class="value green" id="target">--</div></div>
                <div class="trade-item"><label>وقف خسارة</label><div class="value red" id="stop">--</div></div>
            </div>
            <div class="btn-group">
                <button class="btn btn-buy" onclick="executeTrade('BUY')">شراء 🔼 (محاكاة)</button>
                <button class="btn btn-sell" onclick="executeTrade('SELL')">بيع 🔽 (محاكاة)</button>
            </div>
            <button class="btn-share" onclick="shareTrade()">📤 مشاركة الصفقة</button>
        </div>

        <div class="alerts" id="alertsContainer">
            <div style="font-weight:bold; margin-bottom:8px;">🔔 تنبيهات فورية</div>
            <div class="alert-item">⏳ انتظر جلب السعر...</div>
        </div>

        <div class="analysis">
            <div style="font-weight:bold; margin-bottom:6px;">📈 تحليل SMC & ICT</div>
            <p id="analysisText">جاري تحليل السوق...</p>
            <textarea id="userNotes" placeholder="سجل ملاحظاتك هنا..." style="width:100%; margin-top:8px; padding:8px; background:#0b0e14; border:1px solid #1f2937; border-radius:6px; color:#e0e6ed; resize:vertical; min-height:60px;"></textarea>
        </div>
    </div>

    <script>
        // ============================================================
        //  هذا التطبيق يعمل على GitHub Pages فقط
        //  يستخدم WebSocket العام من Binance (بدون مفاتيح)
        //  التداول محاكاة (Paper Trading) لأغراض تعليمية
        // ============================================================

        let currentSymbol = 'BTCUSDT';
        let lastPrice = 0;
        let priceHistory = [];
        let ws = null;

        // ============================================================
        //  الاتصال بـ WebSocket العام من Binance
        // ============================================================
        function connectWebSocket() {
            if (ws) ws.close();
            ws = new WebSocket(`wss://stream.binance.com:9443/ws/${currentSymbol.toLowerCase()}@trade`);

            ws.onopen = () => {
                addAlert(`🟢 متصل بـ Binance لـ ${currentSymbol}`);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                lastPrice = parseFloat(data.p);
                document.getElementById('price').textContent = lastPrice.toFixed(2);
                drawChart(lastPrice);
            };

            ws.onerror = () => {
                document.getElementById('price').textContent = 'خطأ في الاتصال';
            };

            ws.onclose = () => {
                setTimeout(connectWebSocket, 5000);
            };
        }

        // ============================================================
        //  رسم الشارت (Canvas)
        // ============================================================
        const canvas = document.getElementById('chartCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function drawChart(currentPrice) {
            if (!priceHistory.length) priceHistory = Array(50).fill(currentPrice || 60000);
            priceHistory.push(currentPrice);
            if (priceHistory.length > 50) priceHistory.shift();

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const min = Math.min(...priceHistory) * 0.999;
            const max = Math.max(...priceHistory) * 1.001;
            const range = max - min || 1;

            ctx.beginPath();
            ctx.strokeStyle = '#22c55e';
            ctx.lineWidth = 2;
            priceHistory.forEach((p, i) => {
                const x = (i / (priceHistory.length - 1)) * canvas.width;
                const y = canvas.height - ((p - min) / range) * canvas.height;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();

            ctx.fillStyle = '#6b7b95';
            ctx.font = '10px sans-serif';
            ctx.fillText(`أعلى: ${max.toFixed(0)}`, 10, 20);
            ctx.fillText(`أدنى: ${min.toFixed(0)}`, 10, canvas.height - 10);
        }

        // ============================================================
        //  تغيير العملة
        // ============================================================
        function changeSymbol() {
            const newSymbol = document.getElementById('symbolInput').value.trim().toUpperCase();
            if (newSymbol) {
                currentSymbol = newSymbol;
                document.getElementById('alertsContainer').innerHTML = '<div class="alert-item">⏳ جاري تحديث البيانات...</div>';
                priceHistory = [];
                connectWebSocket();
                updateAnalysis();
                addAlert(`🔄 تم التبديل إلى ${currentSymbol}`);
            }
        }

        // ============================================================
        //  تنفيذ صفقة (محاكاة - Paper Trading)
        // ============================================================
        function executeTrade(side) {
            const quantity = parseFloat(document.getElementById('quantityInput').value);
            if (!quantity || quantity <= 0) {
                addAlert('⚠️ أدخل كمية صحيحة');
                return;
            }
            if (!lastPrice) {
                addAlert('⚠️ السعر غير متاح');
                return;
            }

            addAlert(`📝 محاكاة ${side === 'BUY' ? 'شراء' : 'بيع'} عند ${lastPrice.toFixed(2)} برافعة 50x`);
            document.getElementById('entry').textContent = lastPrice.toFixed(2);
            const target = side === 'BUY' ? lastPrice * 1.03 : lastPrice * 0.97;
            const stop = side === 'BUY' ? lastPrice * 0.985 : lastPrice * 1.015;
            document.getElementById('target').textContent = target.toFixed(2);
            document.getElementById('stop').textContent = stop.toFixed(2);
            updateAnalysis(side);
        }

        // ============================================================
        //  تحديث التحليل (SMC / ICT)
        // ============================================================
        function updateAnalysis(side) {
            const el = document.getElementById('analysisText');
            if (side === 'BUY') {
                el.textContent = `محاكاة شراء: تم تحديد منطقة عرض يومية (SMC) عند ${(lastPrice * 0.995).toFixed(0)} مع نموذج ICT 4H. الهدف عند ${(lastPrice * 1.03).toFixed(0)} (سيولة عليا). وقف عند ${(lastPrice * 0.985).toFixed(0)} (تحت القاع السابق).`;
            } else if (side === 'SELL') {
                el.textContent = `محاكاة بيع: تم تحديد منطقة طلب يومية (SMC) عند ${(lastPrice * 1.005).toFixed(0)} مع نموذج ICT 4H. الهدف عند ${(lastPrice * 0.97).toFixed(0)} (سيولة سفلى). وقف عند ${(lastPrice * 1.015).toFixed(0)} (فوق القمة السابقة).`;
            } else {
                el.textContent = `تحليل سوقي لـ ${currentSymbol}: مستويات دعم ومقاومة رئيسية. يرجى انتظار إشارة دخول واضحة.`;
            }
        }

        // ============================================================
        //  نظام التنبيهات
        // ============================================================
        function addAlert(message) {
            const container = document.getElementById('alertsContainer');
            const item = document.createElement('div');
            item.className = 'alert-item';
            item.textContent = message;
            container.appendChild(item);
            if (container.children.length > 10) {
                container.removeChild(container.children[1]);
            }
        }

        // ============================================================
        //  مشاركة الصفقة
        // ============================================================
        function shareTrade() {
            const entry = document.getElementById('entry').textContent;
            const target = document.getElementById('target').textContent;
            const stop = document.getElementById('stop').textContent;
            const text = `🔥 محاكاة صفقة فيوتشرز 50x\nالعملة: ${currentSymbol}\nالدخول: ${entry}\nالهدف: ${target}\nوقف: ${stop}\n#تداول #SMC #ICT`;

            if (navigator.share) {
                navigator.share({ title: 'صفقة تداول', text: text });
            } else {
                navigator.clipboard.writeText(text).then(() => alert('تم نسخ النص للمشاركة!'));
            }
        }

        // ============================================================
        //  تهيئة التطبيق
        // ============================================================
        connectWebSocket();
        setTimeout(() => updateAnalysis(), 1000);
    </script>
</body>
</html>
