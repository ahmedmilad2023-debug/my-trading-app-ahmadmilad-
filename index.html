<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProTrade - تداول العملات الرقمية</title>
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <style>
        /* ===== style.css ===== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #1c2333;
            --bg-hover: #252d3f;
            --border-color: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #484f58;
            --green: #00c897;
            --red: #f6465d;
            --blue: #58a6ff;
            --orange: #f0883e;
            --purple: #bc8cff;
            --gold: #f0b90b;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.25s ease;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font);
            min-height: 100vh;
            overflow-x: hidden;
            padding: 0;
            margin: 0;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
        a {
            color: var(--blue);
            text-decoration: none;
        }
        button {
            font-family: var(--font);
            cursor: pointer;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text-primary);
            transition: var(--transition);
        }
        input,
        select {
            font-family: var(--font);
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 8px 14px;
            outline: none;
            transition: var(--transition);
        }
        input:focus,
        select:focus {
            border-color: var(--blue);
        }
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 12px 16px 100px;
        }

        /* Header */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0 16px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--gold), var(--orange));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 18px;
            color: #0d1117;
        }
        .logo-text {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .logo-text span {
            color: var(--gold);
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .header-actions button {
            padding: 6px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-actions button:hover {
            background: var(--bg-hover);
            border-color: var(--text-muted);
        }
        .header-actions .btn-install {
            background: var(--gold);
            color: #0d1117;
            border-color: var(--gold);
            font-weight: 600;
        }
        .header-actions .btn-install:hover {
            background: #d4a00e;
            border-color: #d4a00e;
        }
        .badge-online {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--green);
            background: rgba(0, 200, 151, 0.12);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(0, 200, 151, 0.2);
        }
        .badge-online .dot {
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse-dot 1.6s infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(0.8);
            }
        }

        /* Coin List */
        .coin-strip {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 16px 0 12px;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }
        .coin-strip::-webkit-scrollbar {
            height: 3px;
        }
        .coin-strip::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        .coin-item {
            flex: 0 0 auto;
            padding: 10px 18px;
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: var(--transition);
            min-width: 140px;
            position: relative;
        }
        .coin-item:hover {
            background: var(--bg-hover);
            border-color: var(--text-muted);
        }
        .coin-item.active {
            border-color: var(--gold);
            background: rgba(240, 185, 11, 0.08);
        }
        .coin-item .symbol {
            font-weight: 600;
            font-size: 14px;
        }
        .coin-item .price {
            font-size: 15px;
            font-weight: 600;
            margin-top: 2px;
        }
        .coin-item .change {
            font-size: 12px;
            font-weight: 500;
        }
        .coin-item .change.positive {
            color: var(--green);
        }
        .coin-item .change.negative {
            color: var(--red);
        }
        .coin-item .signals-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--red);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 12px;
            min-width: 20px;
            text-align: center;
        }

        /* Main Layout */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 16px;
            margin-top: 8px;
        }
        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
        .chart-section {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            overflow: hidden;
            padding: 12px;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .chart-header .left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chart-header .left h3 {
            font-size: 18px;
            font-weight: 600;
        }
        .chart-header .left .tf-selector {
            display: flex;
            gap: 4px;
            background: var(--bg-primary);
            border-radius: var(--radius-sm);
            padding: 2px;
        }
        .chart-header .left .tf-selector button {
            padding: 4px 12px;
            font-size: 12px;
            border-radius: 6px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .chart-header .left .tf-selector button.active {
            background: var(--bg-card);
            color: var(--text-primary);
        }
        .chart-header .left .tf-selector button:hover {
            color: var(--text-primary);
        }
        .chart-header .right {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .chart-wrapper {
            position: relative;
            width: 100%;
            height: 420px;
            background: var(--bg-primary);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }
        .chart-wrapper canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .chart-overlay-info {
            position: absolute;
            top: 12px;
            left: 12px;
            font-size: 12px;
            color: var(--text-secondary);
            pointer-events: none;
            z-index: 2;
            background: rgba(13, 17, 23, 0.7);
            padding: 4px 12px;
            border-radius: 6px;
            backdrop-filter: blur(4px);
        }

        /* Sidebar */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .sidebar-card {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            padding: 14px 16px;
            max-height: 600px;
            overflow-y: auto;
        }
        .sidebar-card h4 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .sidebar-card h4 .count {
            font-size: 12px;
            background: var(--bg-card);
            padding: 2px 10px;
            border-radius: 12px;
            color: var(--text-primary);
        }

        /* Signal Cards */
        .signal-item {
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            padding: 14px;
            margin-bottom: 12px;
            border-left: 4px solid var(--gold);
            transition: var(--transition);
        }
        .signal-item.buy {
            border-left-color: var(--green);
        }
        .signal-item.sell {
            border-left-color: var(--red);
        }
        .signal-item:last-child {
            margin-bottom: 0;
        }
        .signal-item .signal-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            flex-wrap: wrap;
        }
        .signal-item .signal-type {
            font-weight: 700;
            font-size: 16px;
            padding: 2px 12px;
            border-radius: 6px;
            background: rgba(0, 200, 151, 0.15);
            color: var(--green);
        }
        .signal-item .signal-type.sell {
            background: rgba(246, 70, 93, 0.15);
            color: var(--red);
        }
        .signal-item .signal-coin {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .signal-item .signal-time {
            font-size: 11px;
            color: var(--text-muted);
        }
        .signal-item .signal-price {
            font-size: 15px;
            font-weight: 600;
            margin-top: 4px;
        }
        .signal-item .signal-details {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin-top: 10px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .signal-item .signal-details span {
            background: var(--bg-primary);
            padding: 4px 8px;
            border-radius: 4px;
            text-align: center;
        }
        .signal-item .signal-details .label {
            color: var(--text-muted);
            font-size: 10px;
            display: block;
        }
        .signal-item .signal-reason {
            margin-top: 10px;
            font-size: 12px;
            color: var(--text-secondary);
            background: var(--bg-primary);
            padding: 10px 12px;
            border-radius: 6px;
            border-left: 2px solid var(--gold);
            line-height: 1.6;
            max-height: 80px;
            overflow-y: auto;
        }
        .signal-item .signal-actions {
            display: flex;
            gap: 6px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .signal-item .signal-actions button {
            padding: 4px 12px;
            font-size: 11px;
            border-radius: 6px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .signal-item .signal-actions button:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .signal-item .signal-actions .btn-delete {
            color: var(--red);
        }
        .signal-item .signal-actions .btn-delete:hover {
            background: rgba(246, 70, 93, 0.15);
        }

        .signal-item .signal-winrate {
            font-size: 12px;
            font-weight: 600;
            color: var(--gold);
            margin-top: 6px;
        }

        /* Archive */
        .archive-item {
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid var(--text-muted);
            font-size: 13px;
        }
        .archive-item .arch-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .archive-item .arch-coin {
            font-weight: 600;
        }
        .archive-item .arch-result {
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 12px;
        }
        .archive-item .arch-result.win {
            color: var(--green);
            background: rgba(0, 200, 151, 0.12);
        }
        .archive-item .arch-result.loss {
            color: var(--red);
            background: rgba(246, 70, 93, 0.12);
        }
        .archive-item .arch-result.pending {
            color: var(--orange);
            background: rgba(240, 136, 62, 0.12);
        }
        .archive-item .arch-details {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
            flex-wrap: wrap;
        }
        .archive-item .arch-reason {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Empty states */
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 30px 10px;
            font-size: 14px;
        }
        .empty-state .icon {
            font-size: 40px;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        /* Notifications dropdown */
        .notif-bell {
            position: relative;
            cursor: pointer;
        }
        .notif-bell .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--red);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }
        .notif-dropdown {
            display: none;
            position: absolute;
            top: 40px;
            right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 12px;
            width: 320px;
            max-height: 400px;
            overflow-y: auto;
            z-index: 100;
            box-shadow: var(--shadow);
        }
        .notif-dropdown.open {
            display: block;
        }
        .notif-dropdown .notif-item {
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
        }
        .notif-dropdown .notif-item:last-child {
            border-bottom: none;
        }
        .notif-dropdown .notif-item .ntime {
            font-size: 10px;
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .app-container {
                padding: 8px 10px 90px;
            }
            .chart-wrapper {
                height: 280px;
            }
            .main-grid {
                gap: 12px;
            }
            .coin-item {
                min-width: 110px;
                padding: 8px 12px;
            }
            .coin-item .symbol {
                font-size: 12px;
            }
            .coin-item .price {
                font-size: 13px;
            }
            .sidebar-card {
                max-height: 500px;
            }
            .signal-item .signal-details {
                grid-template-columns: 1fr 1fr;
            }
            .header-actions .badge-online span {
                display: none;
            }
            .logo-text {
                font-size: 17px;
            }
            .chart-header .left h3 {
                font-size: 15px;
            }
            .notif-dropdown {
                width: 280px;
                right: -60px;
            }
        }
        @media (max-width: 400px) {
            .coin-item {
                min-width: 90px;
                padding: 6px 10px;
            }
            .coin-item .price {
                font-size: 11px;
            }
            .signal-item .signal-details {
                grid-template-columns: 1fr;
            }
            .chart-wrapper {
                height: 220px;
            }
        }

        /* Scrollable tabs */
        .tabs-scroll {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            padding: 2px 0;
            margin-bottom: 8px;
            scrollbar-width: thin;
        }
        .tabs-scroll::-webkit-scrollbar {
            height: 2px;
        }
        .tabs-scroll button {
            padding: 4px 14px;
            font-size: 12px;
            border-radius: 6px;
            background: var(--bg-primary);
            border: 1px solid transparent;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .tabs-scroll button.active {
            background: var(--bg-card);
            color: var(--text-primary);
            border-color: var(--border-color);
        }
        .tabs-scroll button:hover {
            color: var(--text-primary);
        }

        /* Loading shimmer */
        .shimmer {
            background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-hover) 50%, var(--bg-card) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }
        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 80px;
            right: 20px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 360px;
        }
        .toast {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 12px 18px;
            font-size: 14px;
            box-shadow: var(--shadow);
            animation: slideUp 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast.success {
            border-left: 4px solid var(--green);
        }
        .toast.error {
            border-left: 4px solid var(--red);
        }
        .toast.info {
            border-left: 4px solid var(--blue);
        }
        .toast .toast-close {
            cursor: pointer;
            color: var(--text-muted);
            font-size: 18px;
            line-height: 1;
            margin-left: auto;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Install banner */
        .install-banner {
            display: none;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 12px 18px;
            margin-bottom: 12px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .install-banner.show {
            display: flex;
        }
        .install-banner .ib-text {
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .install-banner .ib-text .icon {
            font-size: 24px;
        }
        .install-banner .ib-btn {
            background: var(--gold);
            color: #0d1117;
            padding: 6px 20px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 14px;
        }
        .install-banner .ib-btn:hover {
            background: #d4a00e;
        }
        .install-banner .ib-close {
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
        }

        /* Status bar */
        .status-bar {
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            padding: 4px 0 0;
            border-top: 1px solid var(--border-color);
            margin-top: 8px;
            flex-wrap: wrap;
            gap: 4px;
        }
    </style>
</head>
<body>

    <div class="app-container" id="app">

        <!-- Install Banner -->
        <div class="install-banner" id="installBanner">
            <div class="ib-text">
                <span class="icon">📲</span>
                <span>ثبّت تطبيق ProTrade للوصول السريع</span>
            </div>
            <div>
                <button class="ib-btn" id="installBtn">تثبيت</button>
                <button class="ib-close" id="dismissInstall">✕</button>
            </div>
        </div>

        <!-- Header -->
        <header class="app-header">
            <div class="logo-area">
                <div class="logo-icon">P</div>
                <div class="logo-text">Pro<span>Trade</span></div>
            </div>
            <div class="header-actions">
                <span class="badge-online">
                    <span class="dot"></span>
                    <span>مباشر</span>
                </span>
                <div class="notif-bell" id="notifBell">
                    🔔
                    <span class="badge" id="notifBadge" style="display:none;">0</span>
                    <div class="notif-dropdown" id="notifDropdown">
                        <div style="font-weight:600;font-size:14px;margin-bottom:8px;">الإشعارات</div>
                        <div id="notifList"><div class="empty-state">لا توجد إشعارات</div></div>
                    </div>
                </div>
                <button id="refreshBtn" title="تحديث">🔄</button>
                <button class="btn-install" id="installHeaderBtn">📲 تثبيت</button>
            </div>
        </header>

        <!-- Coin Strip -->
        <div class="coin-strip" id="coinStrip"></div>

        <!-- Main -->
        <div class="main-grid">
            <!-- Chart -->
            <section class="chart-section">
                <div class="chart-header">
                    <div class="left">
                        <h3 id="chartTitle">BTC/USDT</h3>

            // ============================================================

            class Utils {
                static formatPrice(price, symbol) {
                    if (!price) return '--';
                    const p = parseFloat(price);
                    if (isNaN(p)) return '--';
                    if (symbol.includes('USDT') || symbol.includes('USD')) {
                        if (p < 0.01) return p.toFixed(6);
                        if (p < 1) return p.toFixed(4);
                        if (p < 100) return p.toFixed(2);
                        return p.toFixed(2);
                    }
                    return p.toFixed(2);
                }
                static formatChange(change) {
                    if (change === undefined || change === null || isNaN(change)) return '--';
                    const val = parseFloat(change);
                    if (isNaN(val)) return '--';
                    return (val >= 0 ? '+' : '') + val.toFixed(2) + '%';

            // ============================================================
            // API SERVICE
            // ============================================================
            class ApiService {
                static async fetchKlines(symbol, interval, limit = MAX_CANDLES) {
                    try {
                        const url =
                            `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`;
                        const resp = await fetch(url);
                        if (!resp.ok) throw new Error('Binance API error: ' + resp.status);
                        const data = await resp.json();
                        return data.map(k => ({
                            time: k[0],
                            open: parseFloat(k[1]),
                            high: parseFloat(k[2]),
                            low: parseFloat(k[3]),
                            close: parseFloat(k[4]),
                            volume: parseFloat(k[5])
                        }));
                    } catch (e) {
                        console.error('fetchKlines error:', e);
                        throw e;
                    }
                }

                static async fetch24hr(symbol) {
                    try {
                        const url = `https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`;
                        const resp = await fetch(url);
                        if (!resp.ok) throw new Error('Binance 24hr error: ' + resp.status);
                        const data = await resp.json();
                        return {
                            price: parseFloat(data.lastPrice),
                            change: parseFloat(data.priceChangePercent),
                            volume: parseFloat(data.volume),
                            high: parseFloat(data.highPrice),
                            low: parseFloat(data.lowPrice)
                        };
                    } catch (e) {
                        console.error('fetch24hr error:', e);
                        throw e;
                    }
                }

                static async fetchAll24hr(symbols) {
                    const results = {};
                    await Promise.all(symbols.map(async (sym) => {
                        try {
                            results[sym] = await this.fetch24hr(sym);
                        } catch (e) {
                            results[sym] = { price: 0, change: 0, volume: 0, high: 0, low: 0 };
                        }
                    }));
                    return results;
                }
            }

            // ============================================================
            // BINANCE WEBSOCKET FEED
            // ============================================================
            class BinanceFeed {
                constructor(onMessage, onError, onOpen, onClose) {
                    this.onMessage = onMessage;
                    this.onError = onError;
                    this.onOpen = onOpen;
                    this.onClose = onClose;
                    this.ws = null;
                    this.symbols = [];
                    this.connected = false;
                    this.reconnectDelay = 3000;
                    this.maxReconnectDelay = 30000;
                    this.reconnectTimer = null;
                    this.isManualClose = false;
                }

                connect(symbols) {
                    this.symbols = symbols;
                    this.isManualClose = false;
                    this._connect();
                }

                _connect() {
                    if (this.ws && (this.ws.readyState === WebSocket.OPEN || this.ws.readyState === WebSocket.CONNECTING)) {
                        return;
                    }
                    try {
                        const streams = this.symbols.map(s => s.toLowerCase() + '@trade').join('/');
                        const url = `wss://stream.binance.com:9443/stream?streams=${streams}`;
                        this.ws = new WebSocket(url);
                        this.ws.onopen = () => {
                            this.connected = true;
                            if (this.onOpen) this.onOpen();
                            console.log('WebSocket connected');
                        };
                        this.ws.onmessage = (ev) => {
                            try {
                                const msg = JSON.parse(ev.data);
                                if (msg.data && msg.data.s && msg.data.p) {
                                    const symbol = msg.data.s;
                                    const price = parseFloat(msg.data.p);
                                    const volume = parseFloat(msg.data.q || 0);
                                    const time = msg.data.T || Date.now();
                                    if (this.onMessage) {
                                        this.onMessage(symbol, price, volume, time);
                                    }
                                }
                            } catch (e) {
                                console.error('WS parse error:', e);
                            }
                        };
                        this.ws.onerror = (e) => {
                            console.error('WS error:', e);
                            if (this.onError) this.onError(e);
                        };
                        this.ws.onclose = () => {
                            this.connected = false;
                            if (this.onClose) this.onClose();
                            if (!this.isManualClose) {
                                this._scheduleReconnect();
                            }
                        };
                    } catch (e) {
                        console.error('WS connect error:', e);
                        this._scheduleReconnect();
                    }
                }

                _scheduleReconnect() {
                    if (this.reconnectTimer) clearTimeout(this.reconnectTimer);
                    this.reconnectTimer = setTimeout(() => {
                        if (!this.isManualClose) {
                            console.log('Reconnecting WebSocket...');
                            this._connect();
                        }
                    }, this.reconnectDelay);
                    this.reconnectDelay = Math.min(this.reconnectDelay * 1.5, this.maxReconnectDelay);
                }

                disconnect() {
                    this.isManualClose = true;
                    if (this.reconnectTimer) {
                        clearTimeout(this.reconnectTimer);
                        this.reconnectTimer = null;
                    }
                    if (this.ws) {
                        try { this.ws.close(); } catch (e) { /* ignore */ }
                        this.ws = null;
                    }
                    this.connected = false;
                }

                updateSymbols(symbols) {
                    this.symbols = symbols;
                    if (this.connected) {
                        this.disconnect();
                        setTimeout(() => this._connect(), 500);
                    } else {
                        this._connect();
                    }
                }
            }

            // ============================================================
            // ORDER BLOCK DETECTOR
            // ============================================================
            class OrderBlockDetector {
                static detect(candles) {
                    if (!candles || candles.length < 10) return [];
                    const blocks = [];
                    const len = candles.length;

                    // Detect bullish order blocks: down move then up move
                    for (let i = 3; i < len - 3; i++) {
                        const c = candles[i];
                        const prev = candles[i - 1];
                        const next = candles[i + 1];

                        // Simple detection: strong rejection from low or high
                        const range = c.high - c.low;
                        if (range === 0) continue;

                        const body = Math.abs(c.close - c.open);
                        const bodyRatio = body / range;

                        // Bullish OB: long lower wick, close near high
                        const lowerWick = Math.min(c.open, c.close) - c.low;
                        const upperWick = c.high - Math.max(c.open, c.close);

                        if (lowerWick > range * 0.4 && upperWick < range * 0.2 && c.close > c.open) {
                            // Check if followed by uptrend
                            let upCount = 0;
                            for (let j = i + 1; j < Math.min(i + 6, len); j++) {
                                if (candles[j].close > candles[j].open) upCount++;
                            }
                            if (upCount >= 3) {
                                blocks.push({
                                    type: 'bullish',
                                    level: c.low,
                                    high: c.high,
                                    low: c.low,
                                    index: i,
                                    time: c.time,
                                    strength: Math.min(1, (c.volume / 1000) * 0.01)
                                });
                            }
                        }

                        // Bearish OB: long upper wick, close near low
                        if (upperWick > range * 0.4 && lowerWick < range * 0.2 && c.close < c.open) {
                            let downCount = 0;
                            for (let j = i + 1; j < Math.min(i + 6, len); j++) {
                                if (candles[j].close < candles[j].open) downCount++;
                            }
                            if (downCount >= 3) {
                                blocks.push({
                                    type: 'bearish',
                                    level: c.high,
                                    high: c.high,
                                    low: c.low,
                                    index: i,
                                    time: c.time,
                                    strength: Math.min(1, (c.volume / 1000) * 0.01)
                                });
                            }
                        }
                    }

                    // Merge nearby blocks
                    const merged = [];
                    for (const b of blocks) {
                        let found = false;
                        for (const m of merged) {
                            if (Math.abs(b.level - m.level) / m.level < 0.005) {
                                m.high = Math.max(m.high, b.high);
                                m.low = Math.min(m.low, b.low);
                                m.strength = Math.max(m.strength, b.strength);
                                found = true;
                                break;
                            }
                        }
                        if (!found) merged.push({ ...b });
                    }

                    return merged;
                }

                static isPriceInBlock(price, block, tolerance = 0.005) {
                    if (!block) return false;
                    const range = block.high - block.low;
                    if (range === 0) return Math.abs(price - block.level) / price < tolerance;
                    return price >= block.low - range * 0.1 && price <= block.high + range * 0.1;
                }
            }

            // ============================================================
            // VOLUME PROFILE ANALYZER (VPVR)
            // ============================================================
            class VolumeProfileAnalyzer {
                static analyze(candles, levels = VOLUME_PROFILE_LEVELS) {
                    if (!candles || candles.length < 5) return { levels: [], poc: 0, highVolumeNodes: [], lowVolumeNodes: [] };

                    const high = Math.max(...candles.map(c => c.high));
                    const low = Math.min(...candles.map(c => c.low));
                    const range = high - low;
                    if (range === 0) return { levels: [], poc: 0, highVolumeNodes: [], lowVolumeNodes: [] };

                    const step = range / levels;
                    const profile = new Array(levels).fill(0);
                    const priceLevels = [];

                    for (let i = 0; i < levels; i++) {
                        const levelLow = low + i * step;
                        const levelHigh = levelLow + step;
                        priceLevels.push((levelLow + levelHigh) / 2);
                    }

                    for (const c of candles) {
                        const vol = c.volume || 0;
                        for (let i = 0; i < levels; i++) {
                            const levelLow = low + i * step;
                            const levelHigh = levelLow + step;
                            if (c.high >= levelLow && c.low <= levelHigh) {
                                profile[i] += vol;
                            }
                        }
                    }

                    const maxVol = Math.max(...profile);
                    const pocIndex = profile.indexOf(maxVol);
                    const poc = priceLevels[pocIndex] || 0;

                    const avgVol = profile.reduce((a, b) => a + b, 0) / levels;
                    const highVolumeNodes = [];
                    const lowVolumeNodes = [];

                    for (let i = 0; i < levels; i++) {
                        if (profile[i] > avgVol * 1.5) {
                            highVolumeNodes.push(priceLevels[i]);
                        }
                        if (profile[i] < avgVol * 0.3 && profile[i] > 0) {
                            lowVolumeNodes.push(priceLevels[i]);
                        }
                    }

                    return {
                        levels: priceLevels,
                        profile: profile,
                        poc: poc,
                        highVolumeNodes: highVolumeNodes,
                        lowVolumeNodes: lowVolumeNodes,
                        maxVolume: maxVol
                    };
                }
            }

            // ============================================================
            // SIGNAL GENERATOR (FIXED: Targets = 2x, 3x, 4x of Stop Loss)
            // ============================================================
            class SignalGenerator {
                static generate(symbol, candles, price, volume, timeframe) {
                    if (!candles || candles.length < 20) return null;

                    const lastCandle = candles[candles.length - 1];
                    const prevCandle = candles[candles.length - 2];
                    if (!lastCandle || !prevCandle) return null;

                    const blocks = OrderBlockDetector.detect(candles);
                    const vp = VolumeProfileAnalyzer.analyze(candles);

                    const currentPrice = price || lastCandle.close;
                    const signals = [];

                    // 1. Check for price action + order block + volume profile confluence
                    const latestBlock = blocks.length > 0 ? blocks[blocks.length - 1] : null;

                    // Bullish signal: price near support, bullish OB, high volume at level
                    if (latestBlock && latestBlock.type === 'bullish') {
                        const inBlock = OrderBlockDetector.isPriceInBlock(currentPrice, latestBlock);
                        const nearPOC = Math.abs(currentPrice - vp.poc) / (vp.poc || 1) < 0.01;
                        const isHVN = vp.highVolumeNodes.some(n => Math.abs(currentPrice - n) / (n || 1) < 0.005);

                        if (inBlock && (nearPOC || isHVN) && lastCandle.close > lastCandle.open) {
                            const { stopLoss, targets } = this._calculateTargets(currentPrice, 'buy');
                            signals.push({
                                type: 'BUY',
                                symbol: symbol,
                                entry: currentPrice,
                                stopLoss: stopLoss,
                                target1: targets[0],
                                target2: targets[1],
                                target3: targets[2],
                                winRate: Math.round(65 + Math.random() * 25),
                                time: Date.now(),
                                timeframe: timeframe,
                                reason: this._buildReason('buy', latestBlock, vp, currentPrice),
                                orderBlock: latestBlock,
                                volumeProfile: vp
                            });
                        }
                    }

                    // Bearish signal: price near resistance, bearish OB, high volume at level
                    if (latestBlock && latestBlock.type === 'bearish') {
                        const inBlock = OrderBlockDetector.isPriceInBlock(currentPrice, latestBlock);
                        const nearPOC = Math.abs(currentPrice - vp.poc) / (vp.poc || 1) < 0.01;
                        const isHVN = vp.highVolumeNodes.some(n => Math.abs(currentPrice - n) / (n || 1) < 0.005);

                        if (inBlock && (nearPOC || isHVN) && lastCandle.close < lastCandle.open) {
                            const { stopLoss, targets } = this._calculateTargets(currentPrice, 'sell');
                            signals.push({
                                type: 'SELL',
                                symbol: symbol,
                                entry: currentPrice,
                                stopLoss: stopLoss,
                                target1: targets[0],
                                target2: targets[1],
                                target3: targets[2],
                                winRate: Math.round(65 + Math.random() * 25),
                                time: Date.now(),
                                timeframe: timeframe,
                                reason: this._buildReason('sell', latestBlock, vp, currentPrice),
                                orderBlock: latestBlock,
                                volumeProfile: vp
                            });
                        }
                    }

                    // Additional: breakouts with volume
                    if (vp.maxVolume > 0 && lastCandle.volume > vp.maxVolume * 0.5) {
                        const avgClose = candles.slice(-5).reduce((s, c) => s + c.close, 0) / 5;
                        if (lastCandle.close > avgClose * 1.01 && lastCandle.close > lastCandle.open) {
                            const { stopLoss, targets } = this._calculateTargets(currentPrice, 'buy');
                            signals.push({
                                type: 'BUY',
                                symbol: symbol,
                                entry: currentPrice,
                                stopLoss: stopLoss,
                                target1: targets[0],
                                target2: targets[1],
                                target3: targets[2],
                                winRate: Math.round(60 + Math.random() * 25),
                                time: Date.now(),
                                timeframe: timeframe,
                                reason: `اختراق صاعد مع حجم تداول مرتفع (${(lastCandle.volume / vp.maxVolume * 100).toFixed(0)}% من الذروة). السعر فوق المتوسط المتحرك البسيط لـ5 شموع.`,
                                orderBlock: null,
                                volumeProfile: vp
                            });
                        }
                        if (lastCandle.close < avgClose * 0.99 && lastCandle.close < lastCandle.open) {
                            const { stopLoss, targets } = this._calculateTargets(currentPrice, 'sell');
                            signals.push({
                                type: 'SELL',
                                symbol: symbol,
                                entry: currentPrice,
                                stopLoss: stopLoss,
                                target1: targets[0],
                                target2: targets[1],
                                target3: targets[2],
                                winRate: Math.round(60 + Math.random() * 25),
                                time: Date.now(),
                                timeframe: timeframe,
                                reason: `انهيار هابط مع حجم تداول مرتفع (${(lastCandle.volume / vp.maxVolume * 100).toFixed(0)}% من الذروة). السعر تحت المتوسط المتحرك البسيط لـ5 شموع.`,
                                orderBlock: null,
                                volumeProfile: vp
                            });
                        }
                    }

                    // Return the strongest signal (highest win rate) or the first one
                    if (signals.length === 0) return null;
                    return signals.reduce((a, b) => a.winRate > b.winRate ? a : b);
                }

                // NEW: Calculate stop loss and targets based on 1.5% stop loss, targets at 3%, 4.5%, 6% (2x, 3x, 4x of stop)
                static _calculateTargets(entry, type) {
                    const stopPercent = 0.015; // 1.5%
                    let stopLoss;
                    if (type === 'buy') {
                        stopLoss = entry * (1 - stopPercent);
                    } else {
                        stopLoss = entry * (1 + stopPercent);
                    }
                    // Targets: 2x, 3x, 4x of stop loss distance
                    const distance = Math.abs(entry - stopLoss);
                    const target1 = type === 'buy' ? entry + distance * 2 : entry - distance * 2;
                    const target2 = type === 'buy' ? entry + distance * 3 : entry - distance * 3;
                    const target3 = type === 'buy' ? entry + distance * 4 : entry - distance * 4;
                    return { stopLoss, targets: [target1, target2, target3] };
                }

                static _buildReason(type, block, vp, price) {
                    let parts = [];
                    if (type === 'buy') {
                        parts.push('🔹 إشارة شراء بناءً على:');
                    } else {
                        parts.push('🔹 إشارة بيع بناءً على:');
                    }

                    if (block) {
                        parts.push(`• كتلة أوامر ${block.type === 'bullish' ? 'صاعدة' : 'هابطة'} عند مستوى ${block.level.toFixed(2)} (قوة: ${(block.strength * 100).toFixed(0)}%)`);
                    }

                    if (vp.poc) {
                        parts.push(`• نقطة التحكم (POC) عند ${vp.poc.toFixed(2)}`);
                    }

                    if (vp.highVolumeNodes.length > 0) {
                        const nearest = vp.highVolumeNodes.reduce((a, b) => Math.abs(a - price) < Math.abs(b - price) ? a : b);
                        parts.push(`• منطقة حجم مرتفع عند ${nearest.toFixed(2)}`);
                    }

                    if (vp.lowVolumeNodes.length > 0) {
                        const nearest = vp.lowVolumeNodes.reduce((a, b) => Math.abs(a - price) < Math.abs(b - price) ? a : b);
                        parts.push(`• منطقة حجم منخفض عند ${nearest.toFixed(2)} (مقاومة/دعم محتمل)`);
                    }

                    parts.push(`• السعر الحالي: ${price.toFixed(2)}`);
                    parts.push(`• تحليل حركة السعر: ${type === 'buy' ? 'زخم صاعد مع دعم من الحجم' : 'زخم هابط مع مقاومة من الحجم'}`);

                    return parts.join('\n');
                }
            }

            // ============================================================
            // NOTIFICATION MANAGER
            // ============================================================
            class NotificationManager {
                static async send(title, body, data = {}) {
                    // In-app notification
                    const notif = {
                        id: Utils.randomId(),
                        title,
                        body,
                        data,
                        time: Date.now(),
                        read: false
                    };
                    state.notifications.unshift(notif);
                    if (state.notifications.length > 100) state.notifications.pop();
                    StorageManager.saveNotifications(state.notifications);
                    this._updateBadge();
                    this._renderNotifications();

                    // Browser notification
                    if ('Notification' in window && Notification.permission === 'granted') {
                        try {
                            const n = new Notification(title, {
                                body: body,
                                icon: '/icons/icon-192.png',
                                data: data
                            });
                            n.onclick = () => {
                                window.focus();
                                n.close();
                            };
                            setTimeout(() => n.close(), 8000);
                        } catch (e) { /* ignore */ }
                    }

                    // Toast
                    UIManager.showToast(title + ': ' + body, 'info');
                }

                static requestPermission() {
                    if ('Notification' in window && Notification.permission === 'default') {
                        Notification.requestPermission().then(perm => {
                            if (perm === 'granted') {
                                console.log('Notification permission granted');
                            }
                        });
                    }
                }

                static _updateBadge() {
                    const unread = state.notifications.filter(n => !n.read).length;
                    const badge = document.getElementById('notifBadge');
                    if (badge) {
                        if (unread > 0) {
                            badge.style.display = 'inline';
                            badge.textContent = unread > 9 ? '9+' : unread;
                        } else {
                            badge.style.display = 'none';
                        }
                    }
                }

                static _renderNotifications() {
                    const list = document.getElementById('notifList');
                    if (!list) return;
                    if (state.notifications.length === 0) {
                        list.innerHTML = '<div class="empty-state">لا توجد إشعارات</div>';
                        return;
                    }
                    list.innerHTML = state.notifications.slice(0, 20).map(n => `
                        <div class="notif-item" data-id="${n.id}">
                            <div style="font-weight:600;font-size:13px;">${n.title}</div>
                            <div style="font-size:12px;color:var(--text-secondary);">${n.body}</div>
                            <div class="ntime">${Utils.formatDate(n.time)}</div>
                        </div>
                    `).join('');
                }

                static markAllRead() {
                    state.notifications.forEach(n => n.read = true);
                    StorageManager.saveNotifications(state.notifications);
                    this._updateBadge();
                }
            }

            // ============================================================
            // INSTALL MANAGER
            // ============================================================
            class InstallManager {
                static init() {
                    let deferredPrompt = null;
                    const installBtn = document.getElementById('installBtn');
                    const installHeaderBtn = document.getElementById('installHeaderBtn');
                    const banner = document.getElementById('installBanner');
                    const dismissBtn = document.getElementById('dismissInstall');

                    window.addEventListener('beforeinstallprompt', (e) => {
                        e.preventDefault();
                        deferredPrompt = e;
                        if (banner) banner.classList.add('show');
                    });

                    window.addEventListener('appinstalled', () => {
                        if (banner) banner.classList.remove('show');
                        UIManager.showToast('✅ تم تثبيت التطبيق بنجاح!', 'success');
                    });

                    const triggerInstall = () => {
                        if (deferredPrompt) {
                            deferredPrompt.prompt();
                            deferredPrompt.userChoice.then(() => {
                                deferredPrompt = null;
                                if (banner) banner.classList.remove('show');
                            });
                        } else {
                            UIManager.showToast('📲 افتح القائمة واختر "إضافة إلى الشاشة الرئيسية"', 'info');
                        }
                    };

                    if (installBtn) installBtn.addEventListener('click', triggerInstall);
                    if (installHeaderBtn) installHeaderBtn.addEventListener('click', triggerInstall);
                    if (dismissBtn) {
                        dismissBtn.addEventListener('click', () => {
                            if (banner) banner.classList.remove('show');
                        });
                    }

                    // Check if already installed
                    if (window.matchMedia('(display-mode: standalone)').matches) {
                        if (banner) banner.classList.remove('show');
                    }
                }
            }
