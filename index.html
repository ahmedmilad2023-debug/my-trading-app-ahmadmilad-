<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMC/ICT Signals Pro - Mobile</title>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #0d1117; color: #c9d1d9; padding: 10px; overflow-x: hidden; }
        .app-container { max-width: 800px; margin: 0 auto; }
        
        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        header h1 { font-size: 18px; color: #58a6ff; white-space: nowrap; }
        .status { font-size: 11px; padding: 4px 10px; background: #161b22; border-radius: 20px; border: 1px solid #30363d; }
        .status.online { color: #2ea043; }
        .status.offline { color: #f85149; }

        /* Chart Container - تم تصغيره ليناسب الجوال */
        #tv-chart { height: 320px; background: #161b22; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 12px; }

        /* Controls */
        .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .controls select, .controls button {
            background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
            padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; flex: 1; min-width: 60px;
        }
        .controls select:hover, .controls button:hover { background: #30363d; }

        /* 📍 بطاقة الإشارة - ستظهر هنا بوضوح أسفل الشارت */
        .signal-card {
            background: #161b22; border: 2px solid #58a6ff; border-radius: 12px;
            padding: 15px; margin-bottom: 12px; display: none;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .signal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .badge { padding: 4px 14px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        .badge.BUY { background: #238636; color: white; }
        .badge.SELL { background: #da3633; color: white; }
        .time { color: #8b949e; font-size: 12px; }
        
        .signal-body .row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #21262d; font-size: 13px; }
        .signal-body .row:last-child { border-bottom: none; }
        
        .reason-box { background: #0d1117; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 12px; border-left: 4px solid #58a6ff; line-height: 1.5; }
        
        .signal-actions { display: flex; gap: 10px; margin-top: 12px; }
        .signal-actions button { flex: 1; background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 12px; }

        /* 📜 التاريخ */
        .history-section { background: #161b22; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; margin-bottom: 12px; }
        .history-section h3 { padding: 10px 14px; background: #21262d; border-bottom: 1px solid #30363d; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px 6px; text-align: center; border-bottom: 1px solid #21262d; font-size: 11px; }
        th { background: #21262d; color: #8b949e; }
        .green { color: #2ea043; }
        .red { color: #f85149; }
        .clear-history { background: #da3633; color: white; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; margin: 8px 14px; font-size: 12px; }
        .clear-history:hover { background: #b62324; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <header>
            <h1>📊 SMC/ICT - Mobile</h1>
            <div class="status online" id="status-indicator">🟢 متصل</div>
        </header>

        <!-- TradingView Chart -->
        <div id="tv-chart"></div>

        <!-- Controls -->
        <div class="controls">
            <select id="symbol-select">
                <option value="BTC">BTC</option><option value="ETH">ETH</option><option value="SOL">SOL</option>
                <option value="XRP">XRP</option><option value="ADA">ADA</option><option value="AVAX">AVAX</option>
                <option value="DOT">DOT</option><option value="LINK">LINK</option><option value="MATIC">MATIC</option>
                <option value="BNB">BNB</option>
            </select>
            <button id="refresh-btn">🔄 تحديث</button>
            <button id="history-btn">📜 السجل</button>
        </div>

        <!-- 📍 بطاقة الإشارة (ستظهر هنا بوضوح) -->
        <div id="signal-card" class="signal-card">
            <div class="signal-header">
                <span id="signal-type" class="badge">BUY</span>
                <span id="signal-time" class="time"></span>
            </div>
            <div class="signal-body">
                <div class="row"><span>💰 الدخول:</span><span id="entry-price"></span></div>
                <div class="row"><span>🎯 الهدف:</span><span id="target-price"></span></div>
                <div class="row"><span>🛑 وقف الخسارة:</span><span id="stop-price"></span></div>
                <div class="row"><span>⚡ الرافعة:</span><span id="leverage">50x</span></div>
                <div class="row"><span>📊 نسبة المخاطرة:</span><span id="risk-reward" style="color:#58a6ff;"></span></div>
                <div class="row"><span>📌 نقاط القوة:</span><span id="score-display" style="color:#f0883e;"></span></div>
                <div class="reason-box" id="reason-text"></div>
            </div>
            <div class="signal-actions">
                <button id="share-btn">📤 مشاركة</button>
                <button id="save-btn">💾 حفظ</button>
            </div>
        </div>

        <!-- 📜 التاريخ -->
        <div class="history-section" id="history-section" style="display:none;">
            <h3>📜 تاريخ الإشارات</h3>
            <button class="clear-history" id="clear-history-btn">🗑️ مسح الكل</button>
            <table>
                <thead><tr><th>العملة</th><th>النوع</th><th>الدخول</th><th>الهدف</th><th>وقف</th><th>النقاط</th><th>التاريخ</th></tr></thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SYMBOLS = ['BTC', 'ETH', 'SOL', 'XRP', 'ADA', 'AVAX', 'DOT', 'LINK', 'MATIC', 'BNB'];
        let currentSymbol = 'BTC';
        let currentSignal = null;
        let tvWidget = null;
        let ws = null;
        let lastSignalTime = 0;
        const MIN_SIGNAL_INTERVAL = 60000;

        function initTradingView(symbol) {
            if (tvWidget) { tvWidget.remove(); tvWidget = null; }
            tvWidget = new TradingView.widget({
                container_id: 'tv-chart',
                width: '100%',
                height: 320, // تم التصغير للجوال
                symbol: `BINANCE:${symbol}USDT`,
                interval: '5',
                timezone: 'Asia/Riyadh',
                theme: 'dark',
                style: '1',
                locale: 'ar',
                toolbar_bg: '#161b22',
                enable_publishing: false,
                hide_side_toolbar: false,
                allow_symbol_change: false,
                save_image: false,
                studies: [],
                overrides: {
                    'mainSeriesProperties.candleStyle.upColor': '#2ea043',
                    'mainSeriesProperties.candleStyle.downColor': '#f85149'
                }
            });
        }

        function connectWebSocket(symbol) {
            if (ws) { ws.close(); ws = null; }
            const stream = `${symbol.toLowerCase()}usdt@trade`;
            ws = new WebSocket(`wss://stream.binance.com:9443/ws/${stream}`);
            ws.onopen = () => { document.getElementById('status-indicator').className = 'status online'; document.getElementById('status-indicator').textContent = '🟢 متصل'; };
            ws.onerror = () => { document.getElementById('status-indicator').className = 'status offline'; document.getElementById('status-indicator').textContent = '🔴 خطأ'; };
            ws.onclose = () => { document.getElementById('status-indicator').className = 'status offline'; document.getElementById('status-indicator').textContent = '🔴 قطع الاتصال'; setTimeout(() => connectWebSocket(symbol), 5000); };
        }

        async function fetchKlines(symbol, limit = 100) {
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}USDT&interval=5m&limit=${limit}`);
            const data = await res.json();
            return data.map(k => ({ time: k[0], open: parseFloat(k[1]), high: parseFloat(k[2]), low: parseFloat(k[3]), close: parseFloat(k[4]) }));
        }

        function generateAdvancedSMCSignal(klines) {
            if (klines.length < 30) return null;
            const last = klines[klines.length - 1];
            const prev = klines[klines.length - 2];
            const prev2 = klines[klines.length - 3];
            const prev3 = klines[klines.length - 4];

            const fvgUp = prev.low > prev2.high && last.close > prev.high;
            const fvgDown = prev.high < prev2.low && last.close < prev.low;
            const obUp = prev.low < prev2.low && prev2.low < prev3.low && last.close > prev.high;
            const obDown = prev.high > prev2.high && prev2.high > prev3.high && last.close < prev.low;
            const sweepUp = last.high > prev.high * 1.005 && last.close < prev.close;
            const sweepDown = last.low < prev.low * 0.995 && last.close > prev.close;
            const chochUp = prev.low < prev2.low && last.high > prev.high && last.close > prev.close;
            const chochDown = prev.high > prev2.high && last.low < prev.low && last.close < prev.close;

            let buyScore = 0, sellScore = 0;
            let buyFactors = [], sellFactors = [];

            if (fvgUp) { buyScore += 2; buyFactors.push('FVG'); }
            if (obUp) { buyScore += 3; buyFactors.push('OB'); }
            if (fvgUp && obUp) { buyScore += 6; buyFactors.push('🔥 OB+FVG'); }
            if (sweepDown) { buyScore += 4; buyFactors.push('Sweep'); }
            if (chochUp) { buyScore += 3; buyFactors.push('ChoCh'); }

            if (fvgDown) { sellScore += 2; sellFactors.push('FVG'); }
            if (obDown) { sellScore += 3; sellFactors.push('OB'); }
            if (fvgDown && obDown) { sellScore += 6; sellFactors.push('🔥 OB+FVG'); }
            if (sweepUp) { sellScore += 4; sellFactors.push('Sweep'); }
            if (chochDown) { sellScore += 3; sellFactors.push('ChoCh'); }

            let signal = null;
            const price = last.close;

            if (buyScore >= 7) {
                signal = { type: 'BUY', entry: price.toFixed(2), target: (price * 1.035).toFixed(2), stopLoss: (price * 0.982).toFixed(2), score: buyScore, factors: buyFactors.join(' + '), riskReward: '1.94:1' };
            } else if (sellScore >= 7) {
                signal = { type: 'SELL', entry: price.toFixed(2), target: (price * 0.965).toFixed(2), stopLoss: (price * 1.018).toFixed(2), score: sellScore, factors: sellFactors.join(' + '), riskReward: '1.94:1' };
            }
            return signal;
        }

        function playNotificationSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.value = 880; osc.type = 'sine'; gain.gain.value = 0.3;
                osc.start(); setTimeout(() => { osc.frequency.value = 1100; }, 150); 
                setTimeout(() => { osc.stop(); audioCtx.close(); }, 400);
            } catch (e) {}
        }

        async function updateSignal() {
            const klines = await fetchKlines(currentSymbol);
            const signal = generateAdvancedSMCSignal(klines);
            const card = document.getElementById('signal-card');
            const now = Date.now();

            if (signal) {
                if (now - lastSignalTime < MIN_SIGNAL_INTERVAL && currentSignal && currentSignal.type === signal.type) return;
                currentSignal = signal; lastSignalTime = now;
                card.style.display = 'block';
                document.getElementById('signal-type').textContent = signal.type;
                document.getElementById('signal-type').className = `badge ${signal.type}`;
                document.getElementById('signal-time').textContent = new Date().toLocaleString('ar-EG');
                document.getElementById('entry-price').textContent = `$${signal.entry}`;
                document.getElementById('target-price').textContent = `$${signal.target}`;
                document.getElementById('stop-price').textContent = `$${signal.stopLoss}`;
                document.getElementById('risk-reward').textContent = signal.riskReward;
                document.getElementById('score-display').textContent = `${signal.score}/22 (${signal.factors})`;
                document.getElementById('reason-text').innerHTML = `إشارة ${signal.type === 'BUY' ? 'شراء' : 'بيع'} بناءً على SMC/ICT.<br>العوامل: ${signal.factors}`;
                playNotificationSound();
            } else {
                card.style.display = 'none';
                currentSignal = null;
            }
        }

        function saveSignalToHistory(signal) {
            if (!signal) return;
            const history = JSON.parse(localStorage.getItem('signalHistory') || '[]');
            history.push({ symbol: currentSymbol, type: signal.type, entry: signal.entry, target: signal.target, stopLoss: signal.stopLoss, score: signal.score, timestamp: new Date().toLocaleString('ar-EG') });
            localStorage.setItem('signalHistory', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('signalHistory') || '[]');
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = history.length === 0 ? '<tr><td colspan="7" style="color:#8b949e;">لا توجد إشارات</td></tr>' :
                history.reverse().map(h => `<tr><td>${h.symbol}</td><td class="${h.type === 'BUY' ? 'green' : 'red'}">${h.type}</td><td>$${h.entry}</td><td>$${h.target}</td><td>$${h.stopLoss}</td><td>${h.score}/22</td><td>${h.timestamp}</td></tr>`).join('');
        }

        function clearHistory() {
            if (confirm('مسح جميع الإشارات المحفوظة؟')) { localStorage.removeItem('signalHistory'); renderHistory(); document.getElementById('history-section').style.display = 'none'; }
        }

        document.getElementById('share-btn').addEventListener('click', () => {
            if (!currentSignal) return;
            const text = `📊 إشارة ${currentSignal.type} على ${currentSymbol}\nدخول: $${currentSignal.entry}\nهدف: $${currentSignal.target}\nوقف: $${currentSignal.stopLoss}\nنقاط: ${currentSignal.score}/22`;
            navigator.share ? navigator.share({ title: 'إشارة تداول', text }) : alert(text);
        });

        document.getElementById('save-btn').addEventListener('click', () => { saveSignalToHistory(currentSignal); alert('✅ تم الحفظ'); });
        document.getElementById('history-btn').addEventListener('click', () => {
            const section = document.getElementById('history-section');
            section.style.display = section.style.display === 'none' ? 'block' : 'none';
            renderHistory();
        });
        document.getElementById('clear-history-btn').addEventListener('click', clearHistory);
        document.getElementById('refresh-btn').addEventListener('click', updateSignal);
        document.getElementById('symbol-select').addEventListener('change', (e) => {
            currentSymbol = e.target.value;
            initTradingView(currentSymbol);
            connectWebSocket(currentSymbol);
            updateSignal();
        });

        window.onload = function() {
            initTradingView(currentSymbol);
            connectWebSocket(currentSymbol);
            updateSignal();
            renderHistory();
            setInterval(updateSignal, 45000);
        };
    </script>
</body>
</html>
